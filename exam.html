<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Examination — Exalyte</title>
<meta name="description" content="Take your exam with precision timing and instant results on Exalyte.">
<meta name="theme-color" content="#05050a">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Lexend:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #05050a;
  --surface: #0a0a16;
  --surface2: #111122;
  --surface3: #16162a;
  --border: #1e1e38;
  --border-light: #252545;
  --accent: #6366f1;
  --accent2: #818cf8;
  --accent3: #4f46e5;
  --accent-glow: rgba(99, 102, 241, 0.25);
  --text: #e9e9f0;
  --text-bright: #f5f5ff;
  --muted: #7c7c96;
  --muted-light: #9a9ab0;
  --error: #ef4444;
  --error-glow: rgba(239, 68, 68, 0.2);
  --success: #22c55e;
  --success-glow: rgba(34, 197, 94, 0.2);
  --warning: #f59e0b;
  --premium: #a855f7;
  --radius: 14px;
  --radius-lg: 20px;
  --radius-sm: 8px;
  --radius-xs: 4px;
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
  --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
  --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.5);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.6;
}

/* ═══════════════ TOPBAR ═══════════════ */
.exam-topbar {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: rgba(10, 10, 22, 0.85);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
}

.topbar-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 24px;
  height: 62px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.exam-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.exam-logo-icon {
  width: 34px;
  height: 34px;
  border-radius: 8px;
  background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(129, 140, 248, 0.08));
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid rgba(99, 102, 241, 0.25);
}

.exam-logo-icon img {
  width: 22px;
  height: 22px;
  border-radius: 4px;
}

.exam-logo-text {
  font-family: 'Lexend', sans-serif;
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--text-bright);
  letter-spacing: -0.02em;
}

.exam-mode-badge {
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  padding: 4px 10px;
  border-radius: 15px;
  font-weight: 700;
  margin-left: 4px;
}

.mode-exam {
  background: rgba(239, 68, 68, 0.08);
  color: var(--error);
  border: 1px solid rgba(239, 68, 68, 0.2);
}

.mode-practice {
  background: rgba(34, 197, 94, 0.08);
  color: var(--success);
  border: 1px solid rgba(34, 197, 94, 0.2);
}

.timer-section {
  display: flex;
  align-items: center;
  gap: 12px;
}

.timer-icon-wrap {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(99, 102, 241, 0.06);
  border: 1px solid rgba(99, 102, 241, 0.15);
}

.timer-display {
  font-family: 'JetBrains Mono', 'Lexend', monospace;
  font-size: 1.5rem;
  font-weight: 800;
  color: var(--accent2);
  min-width: 70px;
  text-align: center;
  letter-spacing: 0.04em;
  transition: all 0.3s;
}

.timer-display.warning {
  color: var(--warning);
  animation: timerPulse 1s ease-in-out infinite;
}

.timer-display.critical {
  color: var(--error);
  animation: timerPulse 0.5s ease-in-out infinite;
}

@keyframes timerPulse {
  0%, 100% {
    opacity: 1;
    transform: scale(1);
  }
  50% {
    opacity: 0.6;
    transform: scale(1.05);
  }
}

.timer-label {
  font-size: 0.62rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  font-weight: 700;
}

.tab-leave-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--muted);
  transition: all 0.3s;
}

.tab-leave-indicator.warning {
  color: var(--warning);
}

.tab-leave-indicator.critical {
  color: var(--error);
  animation: timerPulse 1s ease-in-out infinite;
}

.tab-leave-dots {
  display: flex;
  gap: 4px;
}

.tab-leave-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--border);
  transition: all 0.3s;
}

.tab-leave-dot.used {
  background: var(--error);
  box-shadow: 0 0 8px var(--error-glow);
}

/* Progress Bar */
.progress-bar-wrap {
  position: fixed;
  top: 62px;
  left: 0;
  right: 0;
  height: 3px;
  background: var(--border);
  z-index: 999;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  transition: width 0.4s;
  position: relative;
}

.progress-bar-fill::after {
  content: '';
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent2);
  box-shadow: 0 0 10px var(--accent-glow);
}

/* Question Navigator */
.q-nav {
  position: fixed;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 50;
  display: flex;
  flex-direction: column;
  gap: 5px;
  max-height: 60vh;
  overflow-y: auto;
  padding: 4px;
}

.q-nav-dot {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.68rem;
  font-weight: 700;
  cursor: pointer;
  color: var(--muted);
  transition: all 0.25s;
  flex-shrink: 0;
  font-family: 'Lexend', sans-serif;
}

.q-nav-dot:hover {
  border-color: var(--accent);
  color: var(--accent2);
  background: var(--surface2);
}

.q-nav-dot.answered {
  background: rgba(34, 197, 94, 0.08);
  border-color: rgba(34, 197, 94, 0.3);
  color: var(--success);
}

.q-nav-dot.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  box-shadow: 0 0 16px var(--accent-glow);
  transform: scale(1.1);
}

.q-nav-dot.marked {
  background: rgba(245, 158, 11, 0.08);
  border-color: rgba(245, 158, 11, 0.3);
  color: var(--warning);
}

/* Main Content */
.main {
  max-width: 850px;
  margin: 0 auto;
  padding: 32px 20px 60px;
}

.exam-header {
  text-align: center;
  margin-bottom: 32px;
  animation: fadeUp 0.5s ease;
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(16px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.exam-title {
  font-family: 'Lexend', sans-serif;
  font-size: 1.5rem;
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--text-bright);
  margin-bottom: 6px;
}

.exam-subtitle {
  font-size: 0.84rem;
  color: var(--muted);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
}

.exam-subtitle span {
  display: flex;
  align-items: center;
  gap: 5px;
}

/* Question Card */
.q-card {
  background: linear-gradient(135deg, var(--surface), var(--surface2));
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 26px;
  margin-bottom: 18px;
  transition: all 0.35s;
  position: relative;
  animation: fadeUp 0.4s ease backwards;
}

.q-card:nth-child(1) { animation-delay: 0.05s; }
.q-card:nth-child(2) { animation-delay: 0.1s; }
.q-card:nth-child(3) { animation-delay: 0.15s; }
.q-card:nth-child(4) { animation-delay: 0.2s; }
.q-card:nth-child(5) { animation-delay: 0.25s; }

.q-card:hover {
  border-color: rgba(99, 102, 241, 0.2);
}

.q-card.answered {
  border-color: rgba(34, 197, 94, 0.25);
  background: linear-gradient(135deg, var(--surface), rgba(34, 197, 94, 0.02));
}

.q-card.active {
  border-color: var(--accent);
  box-shadow: 0 0 30px rgba(99, 102, 241, 0.1);
}

.q-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.q-num {
  font-family: 'Lexend', sans-serif;
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--accent2);
  display: flex;
  align-items: center;
  gap: 8px;
}

.q-num-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent);
}

.q-mark-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 4px 10px;
  border-radius: 15px;
  font-size: 0.66rem;
  cursor: pointer;
  transition: all 0.25s;
  font-family: 'Inter', sans-serif;
  font-weight: 600;
}

.q-mark-btn:hover {
  border-color: var(--warning);
  color: var(--warning);
}

.q-mark-btn.marked {
  border-color: var(--warning);
  color: var(--warning);
  background: rgba(245, 158, 11, 0.06);
}

.q-text {
  font-size: 0.95rem;
  line-height: 1.75;
  margin-bottom: 18px;
  font-weight: 500;
  color: var(--text-bright);
}

.q-image {
  max-width: 100%;
  max-height: 240px;
  border-radius: var(--radius-sm);
  margin-bottom: 16px;
  object-fit: contain;
  border: 1px solid var(--border);
  background: var(--bg);
}

/* Options */
.options-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.option-btn {
  padding: 14px 16px;
  background: var(--surface3);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 0.86rem;
  user-select: none;
  text-align: left;
  color: var(--text);
}

.option-btn:hover {
  border-color: rgba(99, 102, 241, 0.5);
  background: var(--surface2);
  transform: translateX(2px);
}

.option-btn.selected {
  border-color: var(--accent);
  background: rgba(99, 102, 241, 0.1);
}

.option-btn.selected .option-letter {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

.option-letter {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Lexend', sans-serif;
  font-size: 0.8rem;
  font-weight: 700;
  color: var(--muted);
  flex-shrink: 0;
  transition: all 0.15s;
}

.option-text {
  line-height: 1.4;
  flex: 1;
}

/* Submit Section */
.submit-section {
  text-align: center;
  margin-top: 32px;
  padding: 0 20px;
}

.submit-stats {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.submit-stat {
  text-align: center;
}

.submit-stat-val {
  font-family: 'Lexend', sans-serif;
  font-size: 1.3rem;
  font-weight: 700;
}

.submit-stat-label {
  font-size: 0.66rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-top: 2px;
}

.btn-submit-exam {
  padding: 14px 48px;
  background: linear-gradient(135deg, var(--accent), var(--accent3));
  color: #fff;
  border: none;
  border-radius: 12px;
  font-family: 'Lexend', sans-serif;
  font-size: 0.94rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.35s;
  letter-spacing: 0.02em;
  position: relative;
  overflow: hidden;
}

.btn-submit-exam::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0, transparent 60%);
  opacity: 0;
  transition: opacity 0.4s;
}

.btn-submit-exam:hover::before {
  opacity: 1;
}

.btn-submit-exam:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 35px rgba(99, 102, 241, 0.35);
}

.btn-submit-exam:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
}

/* Tab Leave Warning Overlay */
.tab-leave-overlay {
  position: fixed;
  inset: 0;
  background: rgba(5, 5, 10, 0.92);
  z-index: 3000;
  display: none;
  place-items: center;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.tab-leave-overlay.open {
  display: grid;
}

.tab-leave-dialog {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 36px 28px;
  max-width: 440px;
  width: 90%;
  text-align: center;
  animation: modalIn 0.3s ease;
}

@keyframes modalIn {
  from {
    opacity: 0;
    transform: scale(0.95) translateY(10px);
  }
  to {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
}

.tab-leave-dialog h3 {
  font-family: 'Lexend', sans-serif;
  font-size: 1.2rem;
  font-weight: 800;
  margin-bottom: 10px;
  letter-spacing: -0.02em;
}

.tab-leave-dialog p {
  color: var(--muted);
  font-size: 0.86rem;
  margin-bottom: 24px;
  line-height: 1.6;
}

/* Submit Overlay */
.submit-overlay {
  position: fixed;
  inset: 0;
  background: rgba(5, 5, 10, 0.88);
  z-index: 2000;
  display: none;
  place-items: center;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}

.submit-overlay.open {
  display: grid;
}

.submit-dialog {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 36px 28px;
  max-width: 440px;
  width: 90%;
  text-align: center;
  animation: modalIn 0.3s ease;
}

.submit-dialog h3 {
  font-family: 'Lexend', sans-serif;
  font-size: 1.2rem;
  font-weight: 800;
  margin-bottom: 10px;
  letter-spacing: -0.02em;
}

.submit-dialog p {
  color: var(--muted);
  font-size: 0.86rem;
  margin-bottom: 24px;
  line-height: 1.6;
}

.dialog-stats {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 22px;
}

.dialog-stat {
  text-align: center;
}

.dialog-stat-val {
  font-family: 'Lexend', sans-serif;
  font-size: 1.5rem;
  font-weight: 800;
}

.dialog-stat-label {
  font-size: 0.62rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
}

.btn-confirm {
  padding: 11px 28px;
  background: linear-gradient(135deg, var(--accent), var(--accent3));
  color: #fff;
  border: none;
  border-radius: 10px;
  font-family: 'Lexend', sans-serif;
  font-size: 0.84rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  margin-right: 8px;
}

.btn-confirm:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(99, 102, 241, 0.3);
}

.btn-cancel {
  padding: 11px 28px;
  background: transparent;
  border: 1.5px solid var(--border);
  color: var(--muted);
  border-radius: 10px;
  font-family: 'Lexend', sans-serif;
  font-size: 0.84rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
}

.btn-cancel:hover {
  border-color: var(--text);
  color: var(--text);
}

/* Loading */
.loading-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--muted);
}

.spinner {
  width: 36px;
  height: 36px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto 16px;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

/* Access Denied State */
.access-denied {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}

.access-denied-icon {
  margin-bottom: 16px;
}

.access-denied h3 {
  font-family: 'Lexend', sans-serif;
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--text-bright);
  margin-bottom: 8px;
}

.access-denied p {
  font-size: 0.86rem;
  margin-bottom: 20px;
  line-height: 1.6;
}

/* ═══════════════ RESPONSIVE ═══════════════ */
@media (max-width: 768px) {
  .options-grid {
    grid-template-columns: 1fr;
  }

  .q-nav {
    display: none;
  }

  .main {
    padding: 24px 14px 50px;
  }

  .exam-topbar {
    padding: 0 12px;
  }

  .topbar-inner {
    padding: 0 8px;
  }

  .exam-logo-text {
    font-size: 0.8rem;
  }

  .exam-mode-badge {
    display: none;
  }

  .timer-display {
    font-size: 1.2rem;
    min-width: 60px;
  }
}

@media (max-width: 480px) {
  .q-card {
    padding: 18px 14px;
  }

  .option-btn {
    padding: 12px 14px;
    font-size: 0.82rem;
  }

  .dialog-stats {
    flex-direction: column;
    gap: 8px;
  }
}
</style>
</head>
<body>

<!-- ═══════════════ TOPBAR ═══════════════ -->
<header class="exam-topbar">
  <div class="topbar-inner">
    <a href="/dashboard.html" class="exam-logo">
      <div class="exam-logo-icon">
        <img src="/images/exalyte.png" alt="Exalyte" onerror="this.style.display='none'">
      </div>
      <span class="exam-logo-text">Exalyte</span>
      <span class="exam-mode-badge mode-exam" id="modeBadge">Exam</span>
    </a>

    <div style="display:flex;align-items:center;gap:16px;">
      <!-- Tab Leave Indicator (only in live mode) -->
      <div class="tab-leave-indicator" id="tabLeaveIndicator" style="display:none;">
        <div class="tab-leave-dots">
          <div class="tab-leave-dot" id="tabLeaveDot1"></div>
          <div class="tab-leave-dot" id="tabLeaveDot2"></div>
        </div>
        <span id="tabLeaveLabel">Do not switch tabs</span>
      </div>

      <!-- Timer -->
      <div class="timer-section" id="timerSection">
        <div class="timer-icon-wrap">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent2)" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </div>
        <div>
          <div class="timer-display" id="timerDisplay">--:--</div>
          <div class="timer-label">Time Left</div>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- Progress Bar -->
<div class="progress-bar-wrap">
  <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
</div>

<!-- Question Navigator -->
<div class="q-nav" id="qNav"></div>

<!-- Main Content -->
<div id="mainContent">
  <div class="loading-state">
    <div class="spinner"></div>
    <p>Preparing your examination...</p>
    <p style="font-size:0.78rem;margin-top:4px;opacity:0.6">Loading questions</p>
  </div>
</div>

<!-- Tab Leave Warning Overlay -->
<div class="tab-leave-overlay" id="tabLeaveOverlay">
  <div class="tab-leave-dialog">
    <div style="margin-bottom:16px;">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--error)" stroke-width="1.5">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
    </div>
    <h3 id="tabLeaveTitle">Warning</h3>
    <p id="tabLeaveMessage"></p>
    <button class="btn-confirm" onclick="closeTabLeaveOverlay()">Return to Exam</button>
  </div>
</div>

<!-- Submit Overlay -->
<div class="submit-overlay" id="submitOverlay">
  <div class="submit-dialog">
    <div style="margin-bottom:16px;">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--accent2)" stroke-width="1.5">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="9 12 11 14 15 10"/>
      </svg>
    </div>
    <h3>Submit Examination</h3>
    <p id="confirmMsg"></p>
    <div class="dialog-stats">
      <div class="dialog-stat">
        <div class="dialog-stat-val" style="color:var(--success)" id="dialogAnswered">0</div>
        <div class="dialog-stat-label">Answered</div>
      </div>
      <div class="dialog-stat">
        <div class="dialog-stat-val" style="color:var(--error)" id="dialogUnanswered">0</div>
        <div class="dialog-stat-label">Unanswered</div>
      </div>
      <div class="dialog-stat">
        <div class="dialog-stat-val" style="color:var(--warning)" id="dialogMarked">0</div>
        <div class="dialog-stat-label">Marked</div>
      </div>
    </div>
    <div>
      <button class="btn-confirm" onclick="confirmSubmit()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:middle;margin-right:6px">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Submit Now
      </button>
      <button class="btn-cancel" onclick="closeSubmitOverlay()">Continue Exam</button>
    </div>
  </div>
</div>

<script>
// ═══════════════ AUTH CHECK ═══════════════
const token = localStorage.getItem('token');
const user = JSON.parse(localStorage.getItem('user') || 'null');

if (!token || !user) {
  window.location.href = '/';
}

const examId = new URLSearchParams(location.search).get('id');
const mode = new URLSearchParams(location.search).get('mode') || 'exam';

if (!examId) {
  window.location.href = '/dashboard.html';
}

// ═══════════════ GLOBAL STATE ═══════════════
let questions = [];
let exam = null;
let answers = {};
let markedQuestions = {};
let timerInterval = null;
let timeLeft = 0;
let submitted = false;
let isPracticeMode = mode === 'practice';
let tabLeaveCount = 0;
let maxTabLeaves = 2;
let examStartTime = null;

// Update mode badge
if (isPracticeMode) {
  document.getElementById('modeBadge').textContent = 'Practice';
  document.getElementById('modeBadge').className = 'exam-mode-badge mode-practice';
  document.getElementById('timerSection').style.display = 'none';
} else {
  // Show tab leave indicator for live exams
  document.getElementById('tabLeaveIndicator').style.display = 'flex';
}

// ═══════════════ API HELPER ═══════════════
async function api(method, path, body = null) {
  const options = {
    method: method,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + token
    }
  };

  if (body) {
    options.body = JSON.stringify(body);
  }

  const response = await fetch('/api' + path, options);

  if (response.status === 401) {
    window.location.href = '/';
    return null;
  }

  const data = await response.json();
  return { ok: response.ok, data: data, status: response.status };
}

// ═══════════════ CHECK ACCESS BEFORE LOADING ═══════════════
async function checkAccessAndLoad() {
  // Check exam status
  const statusResult = await api('GET', '/exams/' + examId + '/status');

  if (!statusResult || !statusResult.ok) {
    showAccessDenied('Failed to check exam status', 'Please try again later.');
    return;
  }

  const status = statusResult.data;

  if (isPracticeMode) {
    if (!status.can_practice) {
      if (status.is_live && !status.has_completed_live) {
        showAccessDenied(
          'Live Exam In Progress',
          'You must complete the live exam before accessing practice mode. Practice will be available after the live deadline passes.',
          true
        );
      } else {
        showAccessDenied(
          'Practice Not Available',
          'You must complete the live exam first to unlock practice mode.'
        );
      }
      return;
    }
  } else {
    // Live exam mode
    if (!status.can_attempt_live) {
      if (status.has_completed_live) {
        showAccessDenied(
          'Already Completed',
          'You have already completed this live exam. Practice mode may be available.'
        );
      } else if (!status.is_live) {
        showAccessDenied(
          'Exam Deadline Passed',
          'The live exam deadline has expired. You can practice this exam instead.'
        );
      } else {
        showAccessDenied(
          'Access Denied',
          'You cannot take this exam at this time.'
        );
      }
      return;
    }
  }

  // Load questions
  loadExam();
}

function showAccessDenied(title, message, showPracticeButton = false) {
  document.getElementById('mainContent').innerHTML = `
    <div class="access-denied">
      <div class="access-denied-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--error)" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
      <h3>${title}</h3>
      <p>${message}</p>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
        <a href="/dashboard.html" style="color:var(--accent2);text-decoration:none;font-weight:600;padding:10px 20px;border:1px solid var(--border);border-radius:10px;display:inline-flex;align-items:center;gap:6px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          Back to Dashboard
        </a>
        ${showPracticeButton ? `
        <a href="/exam.html?id=${examId}&mode=practice" style="color:#fff;text-decoration:none;font-weight:600;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent3));border-radius:10px;display:inline-flex;align-items:center;gap:6px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
          </svg>
          Practice Mode
        </a>` : ''}
      </div>
    </div>
  `;
}

// ═══════════════ LOAD EXAM ═══════════════
async function loadExam() {
  try {
    const result = await api('GET', '/exams/' + examId + '/questions');

    if (!result || !result.ok) {
      if (result && result.status === 403) {
        showAccessDenied(
          'Premium Access Required',
          'This exam requires premium access. Please upgrade to continue.'
        );
        return;
      }
      showAccessDenied('Error', 'Failed to load exam questions.');
      return;
    }

    exam = result.data.exam;
    questions = result.data.questions;
    document.title = exam.name + ' — Exalyte';

    if (!isPracticeMode) {
      timeLeft = exam.time_limit * 60;
      startTimer();
    }

    examStartTime = Date.now();
    renderAllQuestions();
    buildNavigator();
  } catch (error) {
    showAccessDenied('Error', 'Failed to load examination. Please check your connection.');
  }
}

// ═══════════════ TIMER ═══════════════
function startTimer() {
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();

    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      autoSubmitDueToTime();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const minutes = Math.floor(timeLeft / 60);
  const seconds = timeLeft % 60;
  const display = document.getElementById('timerDisplay');
  display.textContent = String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');

  display.classList.remove('warning', 'critical');
  if (timeLeft <= 300) {
    display.classList.add('warning');
  }
  if (timeLeft <= 60) {
    display.classList.add('critical');
  }
}

// ═══════════════ TAB LEAVE DETECTION ═══════════════
document.addEventListener('visibilitychange', () => {
  if (isPracticeMode || submitted) {
    return;
  }

  if (document.hidden) {
    tabLeaveCount++;

    if (tabLeaveCount === 1) {
      // First leave: show warning in overlay
      document.getElementById('tabLeaveTitle').textContent = 'Warning — First Violation';
      document.getElementById('tabLeaveMessage').textContent =
        'You have switched away from the exam. You have 1 more chance. Next time your exam will be auto-submitted.';
      document.getElementById('tabLeaveOverlay').classList.add('open');

      // Update indicator
      document.getElementById('tabLeaveDot1').classList.add('used');
      document.getElementById('tabLeaveIndicator').classList.add('warning');
      document.getElementById('tabLeaveLabel').textContent = '1 of 2 leaves used';
    } else if (tabLeaveCount >= maxTabLeaves) {
      // Second leave: auto-submit
      document.getElementById('tabLeaveTitle').textContent = 'Exam Auto-Submitted';
      document.getElementById('tabLeaveMessage').textContent =
        'You have switched tabs twice. Your exam has been automatically submitted.';
      document.getElementById('tabLeaveOverlay').classList.add('open');

      // Update indicator
      document.getElementById('tabLeaveDot2').classList.add('used');
      document.getElementById('tabLeaveIndicator').classList.add('critical');
      document.getElementById('tabLeaveLabel').textContent = 'Auto-submitted';

      // Hide cancel button
      document.querySelector('#tabLeaveOverlay .btn-confirm').style.display = 'none';
      document.querySelector('#tabLeaveOverlay .btn-cancel').style.display = 'none';

      // Auto-submit after 3 seconds
      setTimeout(() => {
        document.getElementById('tabLeaveOverlay').classList.remove('open');
        submitExam();
      }, 3000);
    }
  }
});

// Detect window blur (for when visibilitychange doesn't fire)
window.addEventListener('blur', () => {
  if (isPracticeMode || submitted) {
    return;
  }

  // Only count if visibility API says we're hidden
  if (document.hidden && tabLeaveCount < maxTabLeaves) {
    // Already handled by visibilitychange
  }
});

function closeTabLeaveOverlay() {
  document.getElementById('tabLeaveOverlay').classList.remove('open');

  // Reset buttons
  const confirmBtn = document.querySelector('#tabLeaveOverlay .btn-confirm');
  confirmBtn.style.display = '';
  confirmBtn.textContent = 'Return to Exam';

  const cancelBtn = document.querySelector('#tabLeaveOverlay .btn-cancel');
  if (cancelBtn) {
    cancelBtn.style.display = 'none';
  }
}

// ═══════════════ RENDER QUESTIONS ═══════════════
function renderAllQuestions() {
  document.getElementById('mainContent').innerHTML = `
    <div class="main">
      <div class="exam-header">
        <div class="exam-title">${esc(exam.name)}</div>
        <div class="exam-subtitle">
          <span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent2)" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
            ${questions.length} Questions
          </span>
          ${isPracticeMode ? '<span style="color:var(--success)">Practice Mode</span>' : `<span>${exam.time_limit} min</span>`}
          ${exam.negative_marking > 0 ? `<span style="color:var(--error)">Negative: -${exam.negative_marking}</span>` : ''}
        </div>
      </div>
      ${questions.map((q, i) => `
        <div class="q-card" id="qCard${q.id}">
          <div class="q-card-header">
            <div class="q-num"><span class="q-num-dot"></span> Question ${i + 1}</div>
            <button class="q-mark-btn" id="markBtn${q.id}" onclick="toggleMark('${q.id}')">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
              </svg>
              Mark for Review
            </button>
          </div>
          <div class="q-text">${esc(q.question_text)}</div>
          ${q.image_url ? `<img class="q-image" src="${esc(q.image_url)}" alt="Question image" loading="lazy">` : ''}
          <div class="options-grid">
            ${['A', 'B', 'C', 'D'].map(opt => {
              const text = q['option_' + opt.toLowerCase()];
              return `<div class="option-btn" id="opt_${q.id}_${opt}" onclick="selectAnswer('${q.id}', '${opt}')">
                <div class="option-letter">${opt}</div>
                <div class="option-text">${esc(text)}</div>
              </div>`;
            }).join('')}
          </div>
        </div>
      `).join('')}

      <div class="submit-section">
        <div class="submit-stats">
          <div class="submit-stat">
            <div class="submit-stat-val" style="color:var(--success)" id="statAnswered">0</div>
            <div class="submit-stat-label">Answered</div>
          </div>
          <div class="submit-stat">
            <div class="submit-stat-val" style="color:var(--muted)" id="statUnanswered">${questions.length}</div>
            <div class="submit-stat-label">Remaining</div>
          </div>
          <div class="submit-stat">
            <div class="submit-stat-val" style="color:var(--warning)" id="statMarked">0</div>
            <div class="submit-stat-label">Marked</div>
          </div>
        </div>
        <button class="btn-submit-exam" id="submitBtn" onclick="openSubmitOverlay()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:middle;margin-right:8px">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          ${isPracticeMode ? 'Finish Practice' : 'Submit Examination'}
        </button>
      </div>
    </div>`;
}

function buildNavigator() {
  const nav = document.getElementById('qNav');
  nav.innerHTML = questions.map((q, i) => `
    <div class="q-nav-dot" id="navDot${q.id}" onclick="scrollToQuestion('${q.id}')" title="Question ${i + 1}">
      ${i + 1}
    </div>
  `).join('');
}

function scrollToQuestion(qId) {
  const card = document.getElementById('qCard' + qId);
  if (card) {
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    document.querySelectorAll('.q-card').forEach(c => c.classList.remove('active'));
    card.classList.add('active');
    document.querySelectorAll('.q-nav-dot').forEach(d => d.classList.remove('active'));
    document.getElementById('navDot' + qId)?.classList.add('active');
  }
}

// ═══════════════ ANSWER SELECTION ═══════════════
function selectAnswer(qId, key) {
  if (submitted) {
    return;
  }

  // Remove previous selection
  ['A', 'B', 'C', 'D'].forEach(opt => {
    document.getElementById('opt_' + qId + '_' + opt)?.classList.remove('selected');
  });

  // Set new selection
  document.getElementById('opt_' + qId + '_' + key)?.classList.add('selected');
  answers[qId] = key;

  // Update card and nav status
  document.getElementById('qCard' + qId)?.classList.add('answered');
  document.getElementById('navDot' + qId)?.classList.add('answered');

  updateStats();
  updateProgress();
}

function toggleMark(qId) {
  if (submitted) {
    return;
  }

  markedQuestions[qId] = !markedQuestions[qId];
  const btn = document.getElementById('markBtn' + qId);
  const dot = document.getElementById('navDot' + qId);

  if (markedQuestions[qId]) {
    btn?.classList.add('marked');
    btn.innerHTML = `
      <svg width="12" height="12" viewBox="0 0 24 24" fill="var(--warning)" stroke="currentColor" stroke-width="2.5">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
      Marked`;
    dot?.classList.add('marked');
  } else {
    btn?.classList.remove('marked');
    btn.innerHTML = `
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
      Mark for Review`;
    dot?.classList.remove('marked');
  }

  updateStats();
}

function updateStats() {
  const answered = Object.keys(answers).length;
  const marked = Object.keys(markedQuestions).filter(k => markedQuestions[k]).length;

  document.getElementById('statAnswered').textContent = answered;
  document.getElementById('statUnanswered').textContent = questions.length - answered;
  document.getElementById('statMarked').textContent = marked;
}

function updateProgress() {
  const answered = Object.keys(answers).length;
  const percent = questions.length > 0 ? (answered / questions.length) * 100 : 0;
  document.getElementById('progressFill').style.width = percent + '%';
}

// ═══════════════ SUBMISSION ═══════════════
function openSubmitOverlay() {
  const answered = Object.keys(answers).length;
  const unanswered = questions.length - answered;
  const marked = Object.keys(markedQuestions).filter(k => markedQuestions[k]).length;

  document.getElementById('dialogAnswered').textContent = answered;
  document.getElementById('dialogUnanswered').textContent = unanswered;
  document.getElementById('dialogMarked').textContent = marked;
  document.getElementById('confirmMsg').textContent =
    'You have answered ' + answered + ' of ' + questions.length + ' questions.' +
    (unanswered > 0 ? ' ' + unanswered + ' unanswered will be marked as incorrect.' : '');

  document.getElementById('submitOverlay').classList.add('open');
}

function closeSubmitOverlay() {
  document.getElementById('submitOverlay').classList.remove('open');
}

async function confirmSubmit() {
  closeSubmitOverlay();
  await submitExam();
}

async function autoSubmitDueToTime() {
  if (submitted) {
    return;
  }

  alert('Time expired. Your exam will be submitted automatically.');
  await submitExam();
}

async function submitExam() {
  if (submitted) {
    return;
  }

  submitted = true;
  clearInterval(timerInterval);

  const submitBtn = document.getElementById('submitBtn');
  if (submitBtn) {
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span style="display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:8px"></span> Submitting...';
  }

  try {
    const result = await api('POST', '/exams/' + examId + '/submit', {
      answers: answers,
      is_practice: isPracticeMode
    });

    if (!result || !result.ok) {
      const errorMsg = result?.data?.error || 'Submission failed';
      alert(errorMsg);
      submitted = false;

      if (submitBtn) {
        submitBtn.disabled = false;
        submitBtn.innerHTML = `
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:middle;margin-right:8px">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          ${isPracticeMode ? 'Finish Practice' : 'Submit Examination'}`;
      }
      return;
    }

    // Redirect to result page
    window.location.href = '/result.html?attempt=' + result.data.attemptId + '&exam=' + examId;
  } catch (error) {
    alert('Submission failed: ' + error.message);
    submitted = false;

    if (submitBtn) {
      submitBtn.disabled = false;
      submitBtn.innerHTML = `
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="vertical-align:middle;margin-right:8px">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        ${isPracticeMode ? 'Finish Practice' : 'Submit Examination'}`;
    }
  }
}

// ═══════════════ KEYBOARD SHORTCUTS ═══════════════
document.addEventListener('keydown', (e) => {
  if (submitted) {
    return;
  }

  const key = e.key.toUpperCase();

  // Option selection with A, B, C, D keys
  if (['A', 'B', 'C', 'D'].includes(key)) {
    e.preventDefault();
    const activeCard = document.querySelector('.q-card.active') || document.querySelector('.q-card:not(.answered)');

    if (activeCard) {
      const qId = activeCard.id.replace('qCard', '');
      selectAnswer(qId, key);

      // Auto-scroll to next unanswered question
      const allCards = [...document.querySelectorAll('.q-card')];
      const currentIndex = allCards.indexOf(activeCard);
      const nextUnanswered = allCards.slice(currentIndex + 1).find(card => !card.classList.contains('answered'));

      if (nextUnanswered) {
        activeCard.classList.remove('active');
        nextUnanswered.classList.add('active');
        nextUnanswered.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }
  }

  // Arrow key navigation
  if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
    e.preventDefault();
    const cards = [...document.querySelectorAll('.q-card')];
    const currentIndex = cards.findIndex(c => c.classList.contains('active'));
    const nextIndex = e.key === 'ArrowDown'
      ? Math.min(currentIndex + 1, cards.length - 1)
      : Math.max(currentIndex - 1, 0);

    cards.forEach(c => c.classList.remove('active'));
    cards[nextIndex].classList.add('active');
    cards[nextIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  // Escape to close modals
  if (e.key === 'Escape') {
    closeSubmitOverlay();
    closeTabLeaveOverlay();
  }

  // Enter to submit when submit overlay is open
  if (e.key === 'Enter' && document.getElementById('submitOverlay').classList.contains('open')) {
    confirmSubmit();
  }
});

// ═══════════════ BEFORE UNLOAD WARNING ═══════════════
window.addEventListener('beforeunload', (e) => {
  if (!submitted && questions.length > 0 && !isPracticeMode) {
    e.preventDefault();
    e.returnValue = '';
  }
});

// ═══════════════ OVERLAY OUTSIDE CLICK ═══════════════
document.getElementById('submitOverlay').addEventListener('click', function(e) {
  if (e.target === this) {
    closeSubmitOverlay();
  }
});

document.getElementById('tabLeaveOverlay').addEventListener('click', function(e) {
  if (e.target === this && tabLeaveCount < maxTabLeaves) {
    closeTabLeaveOverlay();
  }
});

// ═══════════════ UTILITY ═══════════════
function esc(text) {
  const div = document.createElement('div');
  div.textContent = String(text || '');
  return div.innerHTML;
}

// ═══════════════ INIT ═══════════════
checkAccessAndLoad();
</script>
</body>
</html>
