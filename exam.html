<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Examination — Exalyte</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Lexend:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#05050a; --surface:#0c0c16; --surface2:#141424; --border:#1e1e32;
  --accent:#6366f1; --accent2:#818cf8; --accent3:#4f46e5;
  --text:#e9e9f0; --muted:#76768e; --error:#ef4444; --success:#22c55e;
  --radius:12px; --radius-sm:8px; --transition:0.2s cubic-bezier(0.4,0,0.2,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:60px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:10px;font-family:'Lexend',sans-serif;font-weight:700;font-size:1rem;letter-spacing:-0.02em}
.logo img{width:30px;height:30px}
.timer-wrap{display:flex;align-items:center;gap:10px}
.timer-label{font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;font-weight:600}
.timer{font-family:'Lexend',sans-serif;font-size:1.4rem;font-weight:800;color:var(--accent2);min-width:80px;text-align:center;letter-spacing:0.02em}
.timer.warning{color:var(--error);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.progress-track{position:fixed;top:60px;left:0;right:0;height:3px;background:var(--border);z-index:49}
.progress-fill{height:100%;background:var(--accent);transition:width .3s}
.main{max-width:800px;margin:0 auto;padding:28px 20px 40px}
.exam-header{margin-bottom:28px;text-align:center}
.exam-title{font-family:'Lexend',sans-serif;font-size:1.5rem;font-weight:800;letter-spacing:-0.02em;margin-bottom:4px}
.exam-info{font-size:0.82rem;color:var(--muted)}
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:20px;transition:all var(--transition)}
.q-card.answered{border-color:rgba(34,197,94,0.2)}
.q-card.active{border-color:var(--accent)}
.q-num{font-family:'Lexend',sans-serif;font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:10px}
.q-text{font-size:1rem;line-height:1.7;margin-bottom:16px;font-weight:500}
.q-image{max-width:100%;max-height:260px;border-radius:var(--radius-sm);margin-bottom:16px;object-fit:contain;border:1px solid var(--border)}
.options{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.option{padding:12px 15px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);
  cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:10px;font-size:0.88rem;user-select:none}
.option:hover{border-color:rgba(99,102,241,0.5);background:#1a1a2e}
.option.selected{border-color:var(--accent);background:rgba(99,102,241,0.12)}
.option.selected .opt-letter{background:var(--accent);border-color:var(--accent);color:#fff}
.option.locked{cursor:not-allowed;opacity:0.7}
.option.locked:hover{border-color:var(--border);background:var(--surface2)}
.opt-letter{width:28px;height:28px;border-radius:6px;background:var(--bg);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-family:'Lexend',sans-serif;
  font-size:0.78rem;font-weight:700;color:var(--muted);flex-shrink:0;transition:all .12s}
.opt-text{line-height:1.4}
.btn-row{display:flex;justify-content:center;margin-top:32px}
.btn-submit{padding:14px 48px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);
  font-family:'Lexend',sans-serif;font-size:0.92rem;font-weight:700;cursor:pointer;transition:all var(--transition);letter-spacing:0.02em}
.btn-submit:hover{background:var(--accent3);box-shadow:0 6px 24px rgba(99,102,241,0.3);transform:translateY(-1px)}
.btn-submit:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none}
.overlay{position:fixed;inset:0;background:rgba(5,5,10,0.85);z-index:200;display:none;place-items:center;backdrop-filter:blur(4px)}
.overlay.open{display:grid}
.dialog{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:32px;max-width:420px;width:90%;text-align:center}
.dialog h3{font-family:'Lexend',sans-serif;font-size:1.2rem;font-weight:800;margin-bottom:10px;letter-spacing:-0.02em}
.dialog p{color:var(--muted);font-size:0.88rem;margin-bottom:22px;line-height:1.5}
.dialog-btns{display:flex;gap:10px;justify-content:center}
.btn-confirm{padding:10px 24px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);
  font-family:'Lexend',sans-serif;font-weight:600;cursor:pointer;transition:all var(--transition)}
.btn-confirm:hover{background:var(--accent3)}
.btn-cancel{padding:10px 24px;background:transparent;border:1px solid var(--border);color:var(--muted);
  border-radius:var(--radius-sm);font-family:'Lexend',sans-serif;font-weight:600;cursor:pointer}
.loading{text-align:center;padding:80px;color:var(--muted)}
.spinner{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){.options{grid-template-columns:1fr}.main{padding:16px 12px}}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">
    <img src="/images/exalyte.png" alt="Exalyte" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
    <span>Exalyte</span>
  </div>
  <div class="timer-wrap"><span class="timer-label">Time Left</span><div class="timer" id="timerDisplay">--:--</div></div>
</div>
<div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

<div id="mainContent"><div class="loading"><div class="spinner"></div>Preparing examination...</div></div>

<div class="overlay" id="submitOverlay">
  <div class="dialog">
    <h3>Submit Examination</h3>
    <p id="confirmMsg"></p>
    <div class="dialog-btns">
      <button class="btn-confirm" onclick="confirmSubmit()">Submit</button>
      <button class="btn-cancel" onclick="closeOverlay()">Continue</button>
    </div>
  </div>
</div>

<script>
const token = localStorage.getItem('token');
const user = JSON.parse(localStorage.getItem('user') || 'null');
if (!token || !user) window.location.href = '/';

const examId = new URLSearchParams(location.search).get('id');
const mode = new URLSearchParams(location.search).get('mode') || 'exam'; // exam or practice
if (!examId) window.location.href = '/dashboard.html';

let questions = [], exam = null, answers = {}, lockedOptions = {}, timerInterval = null, timeLeft = 0, submitted = false;

async function loadExam() {
  try {
    const res = await fetch(`/api/exams/${examId}/questions`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    if (res.status === 401) { window.location.href = '/'; return; }
    if (res.status === 403) { alert('Access restricted.'); window.location.href = '/dashboard.html'; return; }
    const data = await res.json();
    if (data.error) { alert(data.error); window.location.href = '/dashboard.html'; return; }

    exam = data.exam;
    questions = data.questions;
    document.title = `${exam.name} — Exalyte`;

    if (mode !== 'practice') {
      timeLeft = exam.time_limit * 60;
      startTimer();
    }

    renderAll();
  } catch (e) {
    document.getElementById('mainContent').innerHTML = '<div class="loading">Failed to load.</div>';
  }
}

function startTimer() {
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 0) { clearInterval(timerInterval); autoSubmit(); }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
  document.getElementById('timerDisplay').textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  if (timeLeft <= 60) document.getElementById('timerDisplay').classList.add('warning');
}

function updateProgress() {
  const answered = Object.keys(answers).length;
  document.getElementById('progressFill').style.width = (answered / questions.length * 100) + '%';
}

function renderAll() {
  document.getElementById('mainContent').innerHTML = `
    <div class="main">
      <div class="exam-header">
        <div class="exam-title">${esc(exam.name)}</div>
        <div class="exam-info">${questions.length} Questions ${mode==='practice'?'· Practice Mode':'· Timed Exam'}${exam.negative_marking>0?` · Negative: -${exam.negative_marking}/wrong`:''}</div>
      </div>
      ${questions.map((q, i) => `
        <div class="q-card" id="qCard${q.id}">
          <div class="q-num">Question ${i + 1}</div>
          <div class="q-text">${esc(q.question_text)}</div>
          ${q.image_url ? `<img class="q-image" src="${q.image_url}" alt="Image">` : ''}
          <div class="options">
            ${['A','B','C','D'].map(opt => {
              const text = q['option_' + opt.toLowerCase()];
              return `<div class="option" id="opt_${q.id}_${opt}" onclick="selectAnswer('${q.id}','${opt}')">
                <div class="opt-letter">${opt}</div>
                <div class="opt-text">${esc(text)}</div>
              </div>`;
            }).join('')}
          </div>
        </div>
      `).join('')}
      <div class="btn-row">
        <button class="btn-submit" id="submitBtn" onclick="openSubmitOverlay()">
          ${mode === 'practice' ? 'Finish Practice' : 'Submit Examination'}
        </button>
      </div>
    </div>`;
}

function selectAnswer(qId, key) {
  if (lockedOptions[qId]) return; // Locked after selection

  // Remove old selection
  ['A','B','C','D'].forEach(opt => {
    document.getElementById(`opt_${qId}_${opt}`)?.classList.remove('selected');
  });

  // Set new selection
  document.getElementById(`opt_${qId}_${key}`)?.classList.add('selected');
  answers[qId] = key;
  lockedOptions[qId] = true; // Lock — cannot deselect

  // Mark card as answered
  document.getElementById(`qCard${qId}`)?.classList.add('answered');

  updateProgress();
}

function openSubmitOverlay() {
  const answered = Object.keys(answers).length;
  const unanswered = questions.length - answered;
  document.getElementById('confirmMsg').textContent =
    `You have answered ${answered} of ${questions.length} questions.${unanswered > 0 ? ` ${unanswered} unanswered will be marked wrong.` : ''} Confirm submission?`;
  document.getElementById('submitOverlay').classList.add('open');
}

function closeOverlay() { document.getElementById('submitOverlay').classList.remove('open'); }

async function confirmSubmit() {
  closeOverlay();
  await submitExam();
}

async function autoSubmit() {
  if (submitted) return;
  alert('Time expired. Your exam will be submitted automatically.');
  await submitExam();
}

async function submitExam() {
  if (submitted) return;
  submitted = true;
  clearInterval(timerInterval);

  try {
    const res = await fetch(`/api/exams/${examId}/submit`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ answers, is_practice: mode === 'practice' })
    });
    const data = await res.json();
    if (data.error) { alert(data.error); submitted = false; return; }
    window.location.href = `/result.html?attempt=${data.attemptId}&exam=${examId}`;
  } catch (e) {
    alert('Submission failed: ' + e.message);
    submitted = false;
  }
}

function esc(s) { const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }

window.addEventListener('beforeunload', e => {
  if (!submitted && questions.length > 0) { e.preventDefault(); e.returnValue = ''; }
});

loadExam();
</script>
</body>
</html>
