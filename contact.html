<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Exalyte</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Lexend:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#05050a; --surface:#0c0c16; --surface2:#141424; --border:#1e1e32;
  --accent:#6366f1; --accent2:#818cf8; --accent3:#4f46e5;
  --text:#e9e9f0; --muted:#76768e; --error:#ef4444; --success:#22c55e;
  --radius:12px; --radius-sm:8px; --transition:0.25s cubic-bezier(0.4,0,0.2,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
nav{display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:60px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
.nav-logo{display:flex;align-items:center;gap:10px;font-family:'Lexend',sans-serif;font-weight:700;font-size:1.05rem;letter-spacing:-0.02em}
.nav-logo img{width:26px;height:26px;border-radius:4px}
.btn-back{padding:8px 16px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:var(--radius-sm);font-family:'Lexend',sans-serif;font-size:0.8rem;font-weight:600;cursor:pointer;text-decoration:none;transition:all var(--transition)}
.btn-back:hover{border-color:var(--accent);color:var(--accent2)}
.main{max-width:700px;margin:0 auto;padding:48px 24px}
.page-title{font-family:'Lexend',sans-serif;font-size:2rem;font-weight:800;letter-spacing:-0.03em;margin-bottom:8px}
.page-sub{color:var(--muted);font-size:0.95rem;margin-bottom:36px;line-height:1.5}

/* Info Cards */
.info-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:32px}
.info-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center}
.info-card h4{font-family:'Lexend',sans-serif;font-size:0.85rem;font-weight:700;margin-bottom:6px;letter-spacing:-0.01em}
.info-card p{color:var(--muted);font-size:0.82rem;line-height:1.5}
.info-card a{color:var(--accent2);text-decoration:none;font-weight:600}
.tg-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(34,158,217,0.1);color:#229ed9;padding:5px 12px;border-radius:20px;font-size:0.78rem;font-weight:600;text-decoration:none;margin-top:4px;transition:all var(--transition)}
.tg-badge:hover{background:rgba(34,158,217,0.18)}

/* Form Card */
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:20px}
.form-title{font-family:'Lexend',sans-serif;font-size:1.05rem;font-weight:700;margin-bottom:20px;letter-spacing:-0.01em}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:0.66rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:7px}
.form-input,.form-textarea{width:100%;padding:11px 14px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'Inter',sans-serif;font-size:0.88rem;color:var(--text);outline:none;transition:all var(--transition)}
.form-input:focus,.form-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(99,102,241,0.06)}
.form-input::placeholder,.form-textarea::placeholder{color:var(--muted);opacity:0.5}
.form-textarea{resize:vertical;min-height:120px}
.btn-submit{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-family:'Lexend',sans-serif;font-size:0.88rem;font-weight:600;cursor:pointer;transition:all var(--transition);letter-spacing:0.02em}
.btn-submit:hover{background:var(--accent3);box-shadow:0 6px 20px rgba(99,102,241,0.3);transform:translateY(-1px)}
.btn-submit:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none}

/* Alert */
.alert{padding:12px 14px;border-radius:var(--radius-sm);font-size:0.82rem;margin-bottom:16px;display:none;line-height:1.4;font-weight:500}
.alert-error{display:block;background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.18);color:var(--error)}
.alert-success{display:block;background:rgba(34,197,94,0.06);border:1px solid rgba(34,197,94,0.18);color:var(--success)}
.alert-info{display:block;background:rgba(99,102,241,0.06);border:1px solid rgba(99,102,241,0.18);color:var(--accent2)}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.25);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:7px}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:600px){nav{padding:0 16px}.main{padding:32px 16px}.info-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav>
  <div class="nav-logo"><img src="/images/exalyte.png" alt="Exalyte">Exalyte</div>
  <a href="/index.html" class="btn-back">← Home</a>
</nav>

<div class="main">
  <h1 class="page-title">Contact Us</h1>
  <p class="page-sub">Have questions, suggestions, or need help? Reach out below. We respond within 24 hours.</p>

  <!-- Info Row -->
  <div class="info-row">
    <div class="info-card">
      <h4>Telegram</h4>
      <p>Direct message for quick support</p>
      <a href="https://t.me/crackers_10" target="_blank" rel="noopener" class="tg-badge">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.446 1.394c-.14.18-.357.295-.6.295-.002 0-.003 0-.005 0l.213-3.054 5.56-5.022c.24-.213-.054-.334-.373-.121l-6.87 4.326-2.96-.924c-.64-.203-.658-.64.135-.954l11.566-4.458c.538-.196 1.006.128.832.938z"/></svg>
        @crackers_10
      </a>
    </div>
    <div class="info-card">
      <h4>Email</h4>
      <p>Formal inquiries & business</p>
      <a href="mailto:support@exalyte.com" style="color:var(--accent2);font-weight:600">support@exalyte.com</a>
    </div>
  </div>

  <!-- Contact Form -->
  <div class="form-card">
    <div class="form-title">Send a Message</div>
    <div class="alert" id="formAlert"></div>

    <form id="contactForm" onsubmit="handleSubmit(event)">
      <input type="hidden" name="access_key" value="fb64bafc-2ef7-4912-91d8-09087633a38e">
      <input type="hidden" name="subject" value="New Contact Form Submission - Exalyte">
      <input type="hidden" name="from_name" value="Exalyte Contact Form">
      <input type="checkbox" name="botcheck" class="hidden" style="display:none">

      <div class="form-group">
        <label class="form-label">Your Name</label>
        <input class="form-input" type="text" name="name" id="contactName" placeholder="Enter your full name" required>
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" type="email" name="email" id="contactEmail" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label">Message</label>
        <textarea class="form-textarea" name="message" id="contactMessage" placeholder="How can we help you?" required></textarea>
      </div>
      <button class="btn-submit" type="submit" id="submitBtn">Send Message</button>
    </form>
  </div>
</div>

<script>
// ═══ 1 Submission Per Day Check ═══
const SUBMISSION_KEY = 'exalyte_last_contact_submission';

function canSubmit() {
  const lastSubmission = localStorage.getItem(SUBMISSION_KEY);
  if (!lastSubmission) return true;
  
  const lastDate = new Date(parseInt(lastSubmission));
  const now = new Date();
  
  // Check if 24 hours have passed
  const hoursDiff = (now - lastDate) / (1000 * 60 * 60);
  return hoursDiff >= 24;
}

function getTimeUntilNext() {
  const lastSubmission = localStorage.getItem(SUBMISSION_KEY);
  if (!lastSubmission) return null;
  
  const lastDate = new Date(parseInt(lastSubmission));
  const nextAllowed = new Date(lastDate.getTime() + 24 * 60 * 60 * 1000);
  const now = new Date();
  const diffMs = nextAllowed - now;
  
  if (diffMs <= 0) return null;
  
  const hours = Math.floor(diffMs / (1000 * 60 * 60));
  const minutes = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
  
  return `${hours}h ${minutes}m`;
}

// ═══ Form Submit ═══
async function handleSubmit(event) {
  event.preventDefault();
  
  const alertEl = document.getElementById('formAlert');
  const btn = document.getElementById('submitBtn');
  
  // Check submission limit
  if (!canSubmit()) {
    const timeLeft = getTimeUntilNext();
    alertEl.className = 'alert alert-error';
    alertEl.textContent = `You can only send one message per day. Please try again in ${timeLeft}. For urgent matters, contact us on Telegram.`;
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }
  
  // Get form data
  const form = document.getElementById('contactForm');
  const formData = new FormData(form);
  
  // Validate
  const name = document.getElementById('contactName').value.trim();
  const email = document.getElementById('contactEmail').value.trim();
  const message = document.getElementById('contactMessage').value.trim();
  
  if (!name || !email || !message) {
    alertEl.className = 'alert alert-error';
    alertEl.textContent = 'Please fill in all fields.';
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }
  
  if (message.length < 10) {
    alertEl.className = 'alert alert-error';
    alertEl.textContent = 'Message must be at least 10 characters.';
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }
  
  // Submit
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Sending...';
  alertEl.className = 'alert';
  
  try {
    const res = await fetch('https://api.web3forms.com/submit', {
      method: 'POST',
      body: formData
    });
    
    const data = await res.json();
    
    if (data.success) {
      // Save submission timestamp to localStorage
      localStorage.setItem(SUBMISSION_KEY, Date.now().toString());
      
      alertEl.className = 'alert alert-success';
      alertEl.textContent = 'Message sent successfully! We will get back to you within 24 hours. For urgent help, reach us on Telegram @crackers_10';
      form.reset();
      btn.disabled = false;
      btn.textContent = 'Sent ✓';
      setTimeout(() => { btn.textContent = 'Send Message'; }, 3000);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      alertEl.className = 'alert alert-error';
      alertEl.textContent = data.message || 'Failed to send. Please try again or contact us on Telegram.';
      btn.disabled = false;
      btn.textContent = 'Send Message';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  } catch (e) {
    alertEl.className = 'alert alert-error';
    alertEl.textContent = 'Network error. Please try again or contact us on Telegram @crackers_10';
    btn.disabled = false;
    btn.textContent = 'Send Message';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

// ═══ Check on load ═══
(function() {
  if (!canSubmit()) {
    const alertEl = document.getElementById('formAlert');
    const timeLeft = getTimeUntilNext();
    alertEl.className = 'alert alert-info';
    alertEl.textContent = `You've already submitted a message today. Next submission available in ${timeLeft}. For urgent matters, contact us on Telegram @crackers_10`;
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('submitBtn').textContent = 'Limit Reached';
  }
})();
</script>
</body>
</html>
