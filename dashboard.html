<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Exalyte</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Lexend:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#05050a; --surface:#0c0c16; --surface2:#141424; --border:#1e1e32;
  --accent:#6366f1; --accent2:#818cf8; --accent3:#4f46e5;
  --text:#e9e9f0; --muted:#76768e; --error:#ef4444; --success:#22c55e;
  --premium:#a855f7; --radius:12px; --radius-sm:8px;
  --transition:0.2s cubic-bezier(0.4,0,0.2,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
  background-image:radial-gradient(ellipse 60% 50% at 80% 0,rgba(99,102,241,0.04) 0,transparent 70%)}
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;height:60px;display:flex;
  align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:10px;font-family:'Lexend',sans-serif;font-weight:700;font-size:1.05rem;letter-spacing:-0.02em}
.logo img{width:28px;height:28px}
.nav-right{display:flex;align-items:center;gap:14px}
.user-chip{padding:6px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;font-size:0.8rem;display:flex;align-items:center;gap:6px;font-weight:500}
.btn-nav{padding:7px 18px;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:var(--radius-sm);font-family:'Inter',sans-serif;font-size:0.8rem;cursor:pointer;transition:all var(--transition);font-weight:500}
.btn-nav:hover{border-color:var(--accent);color:var(--accent2)}
.main{max-width:1100px;margin:0 auto;padding:36px 28px}
.page-header{margin-bottom:32px}
.page-title{font-family:'Lexend',sans-serif;font-size:1.8rem;font-weight:800;letter-spacing:-0.03em;margin-bottom:6px}
.page-sub{color:var(--muted);font-size:0.9rem}
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:36px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent)}
.stat-label{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);font-weight:600;margin-bottom:8px}
.stat-val{font-family:'Lexend',sans-serif;font-size:2rem;font-weight:800;color:var(--accent2)}
.section-title{font-family:'Lexend',sans-serif;font-size:0.95rem;font-weight:700;margin-bottom:16px;letter-spacing:0.02em;color:var(--muted);text-transform:uppercase}
.exams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:18px}
.exam-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;display:flex;flex-direction:column;gap:12px;transition:all var(--transition)}
.exam-card:hover{border-color:rgba(99,102,241,0.3);transform:translateY(-2px)}
.exam-card.locked{opacity:0.7}.exam-card.locked:hover{transform:none;border-color:var(--border)}
.exam-type{font-size:0.66rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;padding:4px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:4px;align-self:flex-start}
.type-free{background:rgba(34,197,94,0.08);color:var(--success);border:1px solid rgba(34,197,94,0.15)}
.type-premium{background:rgba(168,85,247,0.08);color:var(--premium);border:1px solid rgba(168,85,247,0.15)}
.exam-name{font-family:'Lexend',sans-serif;font-size:1.08rem;font-weight:700;line-height:1.3}
.exam-desc{font-size:0.82rem;color:var(--muted);line-height:1.5}
.exam-meta{display:flex;gap:14px;flex-wrap:wrap;font-size:0.76rem;color:var(--muted)}
.exam-footer{margin-top:auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.attempt-badge{font-size:0.73rem;color:var(--success);background:rgba(34,197,94,0.06);padding:4px 10px;border-radius:20px;border:1px solid rgba(34,197,94,0.12);font-weight:500}
.stored-badge{font-size:0.73rem;color:var(--accent2);background:rgba(99,102,241,0.06);padding:4px 10px;border-radius:20px;border:1px solid rgba(99,102,241,0.12);font-weight:500}
.btn-start{padding:9px 22px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-family:'Lexend',sans-serif;font-size:0.8rem;font-weight:600;cursor:pointer;transition:all var(--transition);text-decoration:none;display:inline-block}
.btn-start:hover{background:var(--accent3);box-shadow:0 4px 16px rgba(99,102,241,0.25)}
.btn-practice{padding:9px 16px;background:var(--surface2);color:var(--accent2);border:1px solid rgba(99,102,241,0.2);border-radius:var(--radius-sm);font-size:0.78rem;font-family:'Lexend',sans-serif;font-weight:600;cursor:pointer;text-decoration:none;display:inline-block;transition:all var(--transition)}
.btn-practice:hover{background:rgba(99,102,241,0.06)}
.btn-locked{padding:9px 16px;background:var(--surface2);color:var(--muted);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:0.8rem;font-family:'Lexend',sans-serif;font-weight:600}
.loading{text-align:center;padding:60px;color:var(--muted)}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){nav{padding:0 16px}.main{padding:20px 16px}}
</style>
</head>
<body>
<nav>
  <div class="logo"><img src="/images/exalyte.png" alt="Exalyte">Exalyte</div>
  <div class="nav-right">
    <div class="user-chip"><span id="userName">...</span></div>
    <button class="btn-nav" onclick="logout()">Sign Out</button>
  </div>
</nav>
<div class="main">
  <div class="page-header"><div class="page-title">Available Examinations</div><div class="page-sub">First attempt scores are recorded. Practice attempts are not stored.</div></div>
  <div class="stats">
    <div class="stat-card"><div class="stat-label">Available</div><div class="stat-val" id="statAvail">—</div></div>
    <div class="stat-card"><div class="stat-label">Completed</div><div class="stat-val" id="statDone">—</div></div>
    <div class="stat-card"><div class="stat-label">Best Score</div><div class="stat-val" id="statBest">—</div></div>
  </div>
  <div class="section-title">Examinations</div>
  <div id="examsGrid" class="exams-grid"><div class="loading" style="grid-column:1/-1"><div class="spinner"></div>Loading...</div></div>
</div>

<script>
const token=localStorage.getItem('token');
const user=JSON.parse(localStorage.getItem('user')||'null');
if(!token||!user)window.location.href='/';
if(user?.is_admin)window.location.href='/admin.html';
document.getElementById('userName').textContent=user?.name||'Student';
function logout(){localStorage.clear();window.location.href='/'}

async function loadExams(){
  try{
    const res=await fetch('/api/exams/',{headers:{Authorization:`Bearer ${token}`}});
    if(res.status===401){logout();return}
    const exams=await res.json();
    renderExams(exams);
  }catch(e){document.getElementById('examsGrid').innerHTML='<div class="loading">Failed to load.</div>'}
}

function renderExams(exams){
  const grid=document.getElementById('examsGrid');
  const accessible=exams.filter(e=>e.accessible);
  const stored=exams.filter(e=>e.stored_attempt);
  const bestPct=stored.length?Math.max(...stored.map(e=>e.stored_attempt.percentage)):null;
  document.getElementById('statAvail').textContent=accessible.length;
  document.getElementById('statDone').textContent=stored.length;
  document.getElementById('statBest').textContent=bestPct!==null?bestPct+'%':'—';

  if(!exams.length){grid.innerHTML='<div class="empty">No exams available.</div>';return}

  grid.innerHTML=exams.map(exam=>{
    const isPremium=!!exam.is_premium;
    const locked=!exam.accessible;
    const storedAttempt=exam.stored_attempt;
    const typeTag=isPremium?'<span class="exam-type type-premium">Premium</span>':'<span class="exam-type type-free">Open</span>';
    let actionBtn;
    if(locked) actionBtn='<span class="btn-locked">Restricted</span>';
    else actionBtn=`
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <a href="/exam.html?id=${exam.id}&mode=exam" class="btn-start">Start Exam</a>
        <a href="/exam.html?id=${exam.id}&mode=practice" class="btn-practice">Practice</a>
      </div>`;
    const storedInfo=storedAttempt
      ?`<span class="stored-badge">Recorded: ${storedAttempt.score}/${storedAttempt.total_questions} · ${storedAttempt.percentage}%</span>`
      :'';
    return`<div class="exam-card ${locked?'locked':''}">
      ${typeTag}<div class="exam-name">${esc(exam.name)}</div>
      ${exam.description?`<div class="exam-desc">${esc(exam.description)}</div>`:''}
      <div class="exam-meta">${exam.time_limit} min · ${exam.question_count} questions${exam.negative_marking>0?` · Negative: -${exam.negative_marking}`:''}</div>
      <div class="exam-footer">${storedInfo||'<span></span>'}${actionBtn}</div>
    </div>`;
  }).join('');
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
loadExams();
</script>
</body>
</html>
