<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard — Exalyte</title>
<link rel="stylesheet" href="assets/main.css">
<style>
.live-strip{background:linear-gradient(135deg,rgba(239,68,68,.1),rgba(239,68,68,.05));border:1px solid rgba(239,68,68,.3);border-radius:16px;padding:18px;margin-bottom:24px;display:none}
.live-strip.visible{display:block}
.live-strip-head{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.live-badge{display:inline-flex;align-items:center;gap:6px;background:var(--live);color:#fff;font-size:.68rem;font-weight:700;padding:4px 10px;border-radius:6px;letter-spacing:.06em;text-transform:uppercase}
.live-exam-item{background:rgba(0,0,0,.25);border:1px solid rgba(239,68,68,.2);border-radius:12px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px}
[data-theme="light"] .live-exam-item{background:rgba(239,68,68,.05)}
.live-exam-name{font-weight:600;font-size:.875rem;color:var(--text-bright)}
.live-countdown{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--live)}
.btn-live{background:var(--live);color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:.78rem;font-weight:700;cursor:pointer;transition:opacity .2s;white-space:nowrap;font-family:'Inter',sans-serif}
.btn-live:hover{opacity:.85}
.rank-item{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:14px;transition:all .2s;margin-bottom:10px}
.rank-item:hover{border-color:rgba(99,102,241,.3)}
.rank-badge{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:.85rem;flex-shrink:0}
.rb1{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff}
.rb2{background:linear-gradient(135deg,#94a3b8,#64748b);color:#fff}
.rb3{background:linear-gradient(135deg,#cd7c3f,#a85d28);color:#fff}
.rbn{background:var(--surface2);color:var(--muted)}
.batch-group{margin-bottom:20px}
.batch-header{display:flex;align-items:center;gap:10px;padding:8px 0;cursor:pointer;user-select:none}
.batch-name{font-family:'Lexend',sans-serif;font-size:.9rem;font-weight:700;color:var(--text-bright)}
.batch-count{font-size:.72rem;color:var(--muted);background:var(--surface2);border:1px solid var(--border);padding:2px 8px;border-radius:5px}
.batch-arrow{width:18px;height:18px;stroke:var(--muted);fill:none;stroke-width:2;transition:transform .2s;flex-shrink:0}
.batch-group.collapsed .batch-arrow{transform:rotate(-90deg)}
.batch-group.collapsed .exams-list{display:none}
.exams-list{display:flex;flex-direction:column;gap:10px}
.exam-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px 18px;transition:all .2s}
.exam-card:hover{border-color:rgba(99,102,241,.3);transform:translateY(-1px);box-shadow:0 6px 20px var(--shadow)}
.exam-card-inner{display:flex;align-items:flex-start;gap:14px}
.exam-body{flex:1;min-width:0}
.exam-name{font-family:'Lexend',sans-serif;font-weight:700;font-size:.92rem;color:var(--text-bright);margin-bottom:4px;letter-spacing:-.01em}
.exam-desc{font-size:.78rem;color:var(--muted);margin-bottom:8px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.exam-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.exam-meta-item{display:flex;align-items:center;gap:3px;font-size:.72rem;color:var(--muted)}
.exam-meta-item svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2}
.exam-meta-item.neg{color:var(--error)}
.exam-actions{display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex-shrink:0}
.score-pill{display:flex;align-items:center;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);padding:5px 10px;border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:.82rem;font-weight:700;color:var(--success)}
.btn-take{background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;border:none;padding:8px 16px;border-radius:10px;font-size:.78rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;white-space:nowrap}
.btn-take:hover{opacity:.9;transform:translateY(-1px)}
.btn-take:disabled{background:var(--surface2);color:var(--muted);transform:none;cursor:not-allowed;opacity:1}
.btn-practice{background:rgba(99,102,241,.12);color:var(--accent2);border:1px solid rgba(99,102,241,.3);padding:7px 14px;border-radius:9px;font-size:.74rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;white-space:nowrap}
.btn-practice:hover{background:rgba(99,102,241,.22)}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
.search-input{flex:1;min-width:180px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:9px 14px;color:var(--text);font-size:.855rem;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--muted)}
.filter-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:8px;font-size:.78rem;font-weight:500;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif;white-space:nowrap}
.filter-btn.active,.filter-btn:hover{background:rgba(99,102,241,.14);border-color:rgba(99,102,241,.4);color:var(--accent2)}
.sect-link{font-size:.78rem;color:var(--accent2);font-weight:600;display:flex;align-items:center;gap:4px;cursor:pointer;border:none;background:none;font-family:'Inter',sans-serif}
.sect-link svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.5}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state svg{width:44px;height:44px;stroke:var(--muted);fill:none;stroke-width:1.5;margin:0 auto 14px;display:block;opacity:.35}
.empty-state h3{font-family:'Lexend',sans-serif;font-size:.9rem;font-weight:700;color:var(--text);margin-bottom:6px}
.empty-state p{font-size:.8rem;line-height:1.6}

/* Bell icon */
.bell-btn{position:relative;width:34px;height:34px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);transition:all .2s;flex-shrink:0}
.bell-btn:hover{color:var(--accent2);border-color:var(--accent2)}
.bell-btn svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2}
.bell-badge{position:absolute;top:-5px;right:-5px;min-width:18px;height:18px;background:var(--error);color:#fff;border-radius:9px;font-size:.62rem;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 5px;line-height:1;display:none}
.bell-badge.show{display:flex}

/* Notification dropdown */
.notif-dropdown{position:absolute;top:44px;right:0;width:360px;max-height:420px;overflow-y:auto;background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:0 12px 40px var(--shadow);z-index:100;display:none}
.notif-dropdown.open{display:block}
.notif-dd-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border)}
.notif-dd-title{font-family:'Lexend',sans-serif;font-weight:700;font-size:.85rem;color:var(--text-bright)}
.notif-dd-item{padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.notif-dd-item:last-child{border-bottom:none}
.notif-dd-item:hover{background:var(--surface2)}
.notif-dd-item.unread{background:rgba(99,102,241,.05);border-left:2px solid var(--accent)}
.notif-dd-item-title{font-weight:600;font-size:.82rem;color:var(--text-bright);margin-bottom:3px}
.notif-dd-item-body{font-size:.76rem;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.notif-dd-item-time{font-size:.68rem;color:var(--muted);margin-top:4px}
.notif-dd-item-img{width:100%;max-height:120px;object-fit:cover;border-radius:8px;margin-top:6px}
.notif-dd-item-link{display:inline-flex;align-items:center;gap:3px;font-size:.7rem;color:var(--accent2);font-weight:600;margin-top:4px}
.notif-dd-empty{text-align:center;padding:30px;color:var(--muted);font-size:.82rem}

.bottom-nav-items{display:flex}
.bottom-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;color:var(--muted);font-size:.62rem;font-weight:600;border:none;background:none;cursor:pointer;transition:color .2s;font-family:'Inter',sans-serif}
.bottom-nav-item.active{color:var(--accent2)}
.bottom-nav-item svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8}

/* Notification overlay */
.notif-overlay{position:fixed;inset:0;z-index:99;display:none}
.notif-overlay.open{display:block}

@media(max-width:600px){
  .exam-card-inner{flex-direction:column;gap:10px}
  .exam-actions{flex-direction:row;align-items:center;width:100%}
  .exam-actions .btn-take,.exam-actions .btn-practice{flex:1;justify-content:center;text-align:center}
  .live-exam-item{flex-wrap:wrap;gap:8px}
  .notif-dropdown{width:calc(100vw - 32px);right:-140px;max-height:360px}
}
</style>
</head>

<script>
if (!requireAuth()) throw '';
const user = getUser();
if (user?.is_admin) window.location.href = 'admin.html';
document.getElementById('userName').textContent = user?.name || '';
document.getElementById('userAvatar').textContent = (user?.name||'?')[0].toUpperCase();

let allExams = [], activeFilter = 'all', countdownTimers = {};

async function load() {
  try {
    const { ok, data } = await apiFetch('/exams/');
    if (!ok) { logout(); return; }
    allExams = (data || []).filter(e => e.accessible);
    updateStats();
    renderLiveStrip();
    renderRankings();
    renderExams();
    loadNotifs();
  } catch { document.getElementById('examsWrap').innerHTML = '<div class="empty-state"><p>Failed to load. Please refresh.</p></div>'; }
}

async function loadNotifs() {
  try {
    const { ok, data } = await apiFetch('/notifications');
    if (!ok) return;
    const notifs = data.notifications || [];
    const unread = data.unread_count || 0;
    const badge = document.getElementById('bellBadge');
    if (unread > 0) {
      badge.textContent = unread;
      badge.classList.add('show');
    } else {
      badge.classList.remove('show');
    }
    renderNotifDropdown(notifs);
  } catch {}
}

function renderNotifDropdown(notifs) {
  const list = document.getElementById('notifDDList');
  if (!notifs.length) {
    list.innerHTML = '<div class="notif-dd-empty">No notifications yet.</div>';
    return;
  }
  list.innerHTML = notifs.map(n => `
    <div class="notif-dd-item ${n.is_read ? '' : 'unread'}" onclick="readNotif(${n.id})">
      <div class="notif-dd-item-title">${esc(n.title)}</div>
      ${n.body ? `<div class="notif-dd-item-body">${esc(n.body)}</div>` : ''}
      ${n.image_url ? `<img src="${esc(n.image_url)}" class="notif-dd-item-img" alt="" onerror="this.style.display='none'">` : ''}
      ${n.link_url ? `<a href="${esc(n.link_url)}" target="_blank" class="notif-dd-item-link" onclick="event.stopPropagation()"><svg viewBox="0 0 24 24" width="10" height="10"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>Open Link</a>` : ''}
      <div class="notif-dd-item-time">${formatDate(n.created_at)} · by ${esc(n.creator_name)}</div>
    </div>
  `).join('');
}

async function readNotif(id) {
  await apiFetch(`/notifications/${id}/read`, { method: 'POST' });
  loadNotifs();
}

async function markAllRead() {
  try {
    const { ok, data } = await apiFetch('/notifications');
    if (!ok) return;
    const notifs = (data.notifications || []).filter(n => !n.is_read);
    for (const n of notifs) {
      await apiFetch(`/notifications/${n.id}/read`, { method: 'POST' });
    }
    loadNotifs();
  } catch {}
}

function toggleNotifs() {
  const dd = document.getElementById('notifDropdown');
  const ov = document.getElementById('notifOverlay');
  const isOpen = dd.classList.contains('open');
  if (isOpen) { dd.classList.remove('open'); ov.classList.remove('open'); }
  else { dd.classList.add('open'); ov.classList.add('open'); loadNotifs(); }
}

function closeNotifs() {
  document.getElementById('notifDropdown').classList.remove('open');
  document.getElementById('notifOverlay').classList.remove('open');
}

function updateStats() {
  document.getElementById('sTotal').textContent = allExams.length;
  const done = allExams.filter(e=>e.stored_attempt).length;
  document.getElementById('sDone').textContent = done;
  const best = done ? Math.max(...allExams.filter(e=>e.stored_attempt).map(e=>e.stored_attempt.percentage)).toFixed(0)+'%' : '—';
  document.getElementById('sBest').textContent = best;
  document.getElementById('sPractice').textContent = allExams.filter(e=>e.can_practice).length || '—';
}

function renderLiveStrip() {
  const lives = allExams.filter(e=>e.is_live && !e.stored_attempt && e.accessible);
  const strip = document.getElementById('liveStrip');
  if (!lives.length) { strip.classList.remove('visible'); return; }
  strip.classList.add('visible');
  document.getElementById('liveList').innerHTML = lives.map(e=>`
    <div class="live-exam-item">
      <div><div class="live-exam-name">${esc(e.name)}</div><div class="live-countdown" id="cd_${e.id}">${formatTime(e.live_seconds_remaining)}</div></div>
      <button class="btn-live" onclick="goExam(${e.id},false)">Take Live Exam</button>
    </div>`).join('');
  lives.forEach(e => {
    let s = e.live_seconds_remaining;
    if (countdownTimers[e.id]) clearInterval(countdownTimers[e.id]);
    countdownTimers[e.id] = setInterval(()=>{ s--; const el=document.getElementById('cd_'+e.id); if(el)el.textContent=formatTime(s); if(s<=0){clearInterval(countdownTimers[e.id]);load();} },1000);
  });
}

async function renderRankings() {
  const done = allExams.filter(e=>e.stored_attempt).slice(0,4);
  if (!done.length) return;
  document.getElementById('rankSection').style.display = 'block';
  const rows = await Promise.all(done.map(async e=>{
    try{ const{data}=await apiFetch('/leaderboard/'+e.id); return{exam:e,lb:data}; }catch{return{exam:e,lb:null};}
  }));
  document.getElementById('rankGrid').innerHTML = rows.map(({exam,lb},i)=>{
    const bc = ['rb1','rb2','rb3','rbn'][Math.min(i,3)];
    return `<div class="rank-item">
      <div class="rank-badge ${bc}">#${lb?.rank||'—'}</div>
      <div style="flex:1;min-width:0"><div style="font-weight:600;font-size:.85rem;color:var(--text-bright);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(exam.name)}</div><div style="font-size:.74rem;color:var(--muted);margin-top:2px">${lb?lb.total_participants+' participants · Top '+lb.percentile+'%':'—'}</div></div>
      <div style="font-family:'Lexend',sans-serif;font-weight:800;color:var(--accent2);font-size:.9rem">${exam.stored_attempt?.percentage?.toFixed(0)||0}%</div>
    </div>`;
  }).join('');
}

function renderExams() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let list = allExams.filter(e=>{
    const mq = !q || e.name.toLowerCase().includes(q) || (e.description||'').toLowerCase().includes(q);
    if (!mq) return false;
    if (activeFilter==='free') return !e.is_premium;
    if (activeFilter==='premium') return e.is_premium;
    if (activeFilter==='live') return e.is_live;
    if (activeFilter==='done') return !!e.stored_attempt;
    return true;
  });

  if (!list.length) {
    document.getElementById('examsWrap').innerHTML=`<div class="empty-state"><svg viewBox="0 0 24 24"><path d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg><h3>No exams found</h3><p>Try different filters or search terms.</p></div>`;
    return;
  }

  const groups = {};
  list.forEach(e=>{
    const k = e.batch_id ? (e.batch_name||'Batch') : '__none__';
    if(!groups[k]) groups[k]=[];
    groups[k].push(e);
  });

  let html = '';
  Object.entries(groups).forEach(([k,exams])=>{
    const label = k==='__none__' ? 'Other Exams' : k;
    html += `<div class="batch-group">
      <div class="batch-header" onclick="this.closest('.batch-group').classList.toggle('collapsed')">
        <svg class="batch-arrow" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        <span class="batch-name">${esc(label)}</span>
        <span class="batch-count">${exams.length}</span>
      </div>
      <div class="exams-list">${exams.map(examCard).join('')}</div>
    </div>`;
  });
  document.getElementById('examsWrap').innerHTML = html;
}

function examCard(e) {
  const typeBadge = e.is_live
    ? '<span class="badge badge-live"><span class="live-dot"></span>Live</span>'
    : e.is_premium ? '<span class="badge badge-premium">Premium</span>' : '<span class="badge badge-free">Free</span>';

  const scorePill = e.stored_attempt
    ? `<div class="score-pill">${e.stored_attempt.percentage.toFixed(0)}%</div>` : '';

  let action = '';
  if (e.is_live && !e.stored_attempt) {
    action = `<button class="btn-take" onclick="goExam(${e.id},false)">Take Live</button>`;
  } else if (!e.live_deadline_hours && !e.stored_attempt) {
    action = `<button class="btn-take" onclick="goExam(${e.id},false)">Start Exam</button>`;
  } else if (e.stored_attempt) {
    action = `<button class="btn-take" onclick="window.location='result.html?examId=${e.id}&attemptId=${e.stored_attempt.id}'">View Result</button>`;
    if (e.can_practice) action += `<button class="btn-practice" onclick="goExam(${e.id},true)">Practice</button>`;
  } else if (e.live_deadline_hours && !e.is_live) {
    action = `<button class="btn-take" disabled>Ended</button>`;
  }

  return `<div class="exam-card">
    <div class="exam-card-inner">
      <div class="exam-body">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">${typeBadge}<span class="exam-name">${esc(e.name)}</span></div>
        ${e.description?`<div class="exam-desc">${esc(e.description)}</div>`:''}
        <div class="exam-meta">
          <span class="exam-meta-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${e.time_limit}min</span>
          <span class="exam-meta-item"><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/></svg>${e.question_count} Qs</span>
          ${e.negative_marking>0?`<span class="exam-meta-item neg"><svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg>-${e.negative_marking} NM</span>`:''}
        </div>
      </div>
      <div class="exam-actions">${scorePill}${action}</div>
    </div>
  </div>`;
}

function setFilter(btn) {
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.f;
  renderExams();
}

function goExam(id, practice) {
  window.location.href = `exam.html?id=${id}&practice=${practice?1:0}`;
}

load();
</script>
</body>
</html>
