<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard — Exalyte</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05050a;--surface:#0a0a16;--surface2:#111122;--surface3:#16162a;
  --border:#1e1e38;--accent:#6366f1;--accent2:#818cf8;--accent3:#4f46e5;
  --text:#e9e9f0;--text-bright:#f5f5ff;--muted:#7c7c96;
  --error:#ef4444;--success:#22c55e;--warning:#f59e0b;
  --premium:#a855f7;--live:#ef4444;
}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;display:flex;min-height:100vh}

/* Sidebar */
.sidebar{width:240px;min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:50;transition:transform .3s}
.sidebar-logo{padding:24px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#6366f1,#4f46e5);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-icon svg{width:18px;height:18px;fill:none;stroke:white;stroke-width:2}
.logo-text{font-family:'Lexend',sans-serif;font-weight:700;font-size:1.1rem;color:var(--text-bright);letter-spacing:-.02em}
.sidebar-nav{padding:16px 12px;flex:1}
.nav-section{margin-bottom:8px}
.nav-section-label{font-size:.65rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:0 8px;margin-bottom:6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:var(--muted);text-decoration:none;font-size:.875rem;font-weight:500;transition:all .2s;cursor:pointer;border:none;background:none;width:100%;font-family:'Inter',sans-serif}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:rgba(99,102,241,.15);color:var(--accent2)}
.nav-item svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;flex-shrink:0}
.sidebar-footer{padding:16px 12px;border-top:1px solid var(--border)}
.user-card{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:var(--surface2)}
.user-avatar{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent3));border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Lexend',sans-serif;font-weight:700;font-size:.875rem;color:white;flex-shrink:0}
.user-info{overflow:hidden;flex:1}
.user-name{font-weight:600;font-size:.8rem;color:var(--text-bright);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:.7rem;color:var(--muted)}

/* Main */
.main{margin-left:240px;flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{padding:20px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;background:rgba(5,5,10,.8);backdrop-filter:blur(20px)}
.topbar-title{font-family:'Lexend',sans-serif;font-size:1.1rem;font-weight:700;color:var(--text-bright)}
.topbar-actions{display:flex;gap:8px;align-items:center}
.content{padding:32px;flex:1}

/* Stats cards */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:32px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;position:relative;overflow:hidden;transition:transform .2s}
.stat-card:hover{transform:translateY(-2px)}
.stat-card::before{content:'';position:absolute;top:0;right:0;width:60px;height:60px;background:linear-gradient(135deg,rgba(99,102,241,.15),transparent);border-radius:0 16px 0 60px}
.stat-icon{width:36px;height:36px;background:rgba(99,102,241,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.stat-icon svg{width:18px;height:18px;stroke:var(--accent2);fill:none;stroke-width:2}
.stat-value{font-family:'Lexend',sans-serif;font-size:1.8rem;font-weight:800;color:var(--text-bright);letter-spacing:-.03em}
.stat-label{font-size:.75rem;color:var(--muted);font-weight:500;margin-top:2px}

/* Live exams strip */
.live-strip{background:linear-gradient(135deg,rgba(239,68,68,.1),rgba(239,68,68,.05));border:1px solid rgba(239,68,68,.3);border-radius:16px;padding:20px;margin-bottom:32px;display:none}
.live-strip.visible{display:block}
.live-strip-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.live-badge{display:inline-flex;align-items:center;gap:6px;background:var(--live);color:white;font-size:.7rem;font-weight:700;padding:4px 10px;border-radius:6px;letter-spacing:.06em;text-transform:uppercase}
.live-dot{width:6px;height:6px;background:white;border-radius:50%;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.live-strip-title{font-family:'Lexend',sans-serif;font-weight:700;color:var(--text-bright);font-size:.9rem}
.live-exams-list{display:grid;gap:10px}
.live-exam-item{background:rgba(0,0,0,.3);border:1px solid rgba(239,68,68,.2);border-radius:12px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.live-exam-name{font-weight:600;font-size:.875rem;color:var(--text-bright)}
.live-exam-countdown{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--live);font-weight:500}
.btn-live{background:var(--live);color:white;border:none;padding:8px 16px;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;transition:opacity .2s;white-space:nowrap;font-family:'Inter',sans-serif}
.btn-live:hover{opacity:.85}

/* Section header */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-family:'Lexend',sans-serif;font-size:1rem;font-weight:700;color:var(--text-bright)}
.section-link{font-size:.8rem;color:var(--accent2);text-decoration:none;font-weight:600;display:flex;align-items:center;gap:4px}

/* Rankings preview */
.rankings-grid{display:grid;gap:10px;margin-bottom:32px}
.rank-item{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;display:flex;align-items:center;gap:14px;transition:all .2s}
.rank-item:hover{border-color:rgba(99,102,241,.3)}
.rank-badge{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:.875rem;flex-shrink:0}
.rank-badge.r1{background:linear-gradient(135deg,#f59e0b,#d97706);color:white}
.rank-badge.r2{background:linear-gradient(135deg,#94a3b8,#64748b);color:white}
.rank-badge.r3{background:linear-gradient(135deg,#cd7c3f,#a85d28);color:white}
.rank-badge.rn{background:var(--surface2);color:var(--muted)}
.rank-info{flex:1;min-width:0}
.rank-exam{font-weight:600;font-size:.85rem;color:var(--text-bright);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-meta{font-size:.75rem;color:var(--muted);margin-top:2px}
.rank-perc{font-family:'Lexend',sans-serif;font-size:.9rem;font-weight:700;color:var(--accent2)}

/* Filters */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.filter-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:8px;font-size:.8rem;font-weight:500;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}
.filter-btn:hover,.filter-btn.active{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.4);color:var(--accent2)}
.search-box{flex:1;min-width:200px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:8px 14px;color:var(--text);font-size:.875rem;font-family:'Inter',sans-serif;outline:none;transition:border-color .2s}
.search-box:focus{border-color:var(--accent)}
.search-box::placeholder{color:var(--muted)}

/* Batch groups */
.batch-group{margin-bottom:24px}
.batch-header{display:flex;align-items:center;gap:10px;padding:10px 0;cursor:pointer;user-select:none}
.batch-name{font-family:'Lexend',sans-serif;font-size:.9rem;font-weight:700;color:var(--text-bright)}
.batch-count{font-size:.75rem;color:var(--muted);background:var(--surface2);padding:2px 8px;border-radius:6px}
.batch-toggle{width:20px;height:20px;stroke:var(--muted);fill:none;stroke-width:2;transition:transform .2s;flex-shrink:0}
.batch-group.collapsed .batch-toggle{transform:rotate(-90deg)}
.batch-group.collapsed .exams-list{display:none}

.exams-list{display:grid;gap:10px}
.exam-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;display:flex;align-items:flex-start;gap:16px;transition:all .2s;cursor:pointer}
.exam-card:hover{border-color:rgba(99,102,241,.3);transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.exam-type-badge{padding:3px 8px;border-radius:6px;font-size:.65rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;flex-shrink:0}
.badge-free{background:rgba(34,197,94,.15);color:#22c55e}
.badge-premium{background:rgba(168,85,247,.15);color:#a855f7}
.badge-live{background:rgba(239,68,68,.15);color:#ef4444;animation:livePulse 2s infinite}
@keyframes livePulse{0%,100%{opacity:1}50%{opacity:.6}}
.exam-info{flex:1;min-width:0}
.exam-name{font-family:'Lexend',sans-serif;font-weight:700;font-size:.95rem;color:var(--text-bright);margin-bottom:4px;letter-spacing:-.01em}
.exam-desc{font-size:.8rem;color:var(--muted);margin-bottom:10px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.exam-meta{display:flex;gap:12px;flex-wrap:wrap}
.exam-meta-item{display:flex;align-items:center;gap:4px;font-size:.75rem;color:var(--muted)}
.exam-meta-item svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}
.exam-score-badge{display:flex;align-items:center;gap:6px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);padding:6px 12px;border-radius:8px;flex-shrink:0}
.exam-score-badge .score{font-family:'JetBrains Mono',monospace;font-size:.875rem;font-weight:700;color:#22c55e}
.exam-actions{display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex-shrink:0}
.btn-take{background:linear-gradient(135deg,var(--accent),var(--accent3));color:white;border:none;padding:9px 18px;border-radius:10px;font-size:.8rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;white-space:nowrap}
.btn-take:hover{opacity:.9;transform:translateY(-1px)}
.btn-take:disabled{background:var(--surface2);color:var(--muted);transform:none;cursor:not-allowed}
.btn-practice{background:rgba(99,102,241,.15);color:var(--accent2);border:1px solid rgba(99,102,241,.3);padding:7px 14px;border-radius:9px;font-size:.75rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;white-space:nowrap}
.btn-practice:hover{background:rgba(99,102,241,.25)}
.btn-locked{background:none;color:var(--muted);border:1px solid var(--border);padding:9px 18px;border-radius:10px;font-size:.8rem;font-weight:500;cursor:not-allowed;display:flex;align-items:center;gap:6px;font-family:'Inter',sans-serif}
.btn-locked svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}

.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state svg{width:48px;height:48px;stroke:var(--muted);fill:none;stroke-width:1.5;margin:0 auto 16px;display:block;opacity:.4}
.empty-state h3{font-family:'Lexend',sans-serif;font-size:.95rem;font-weight:600;color:var(--text);margin-bottom:8px}
.empty-state p{font-size:.8rem;line-height:1.5}

/* Loading skeleton */
.skeleton{background:linear-gradient(90deg,var(--surface2) 25%,var(--surface3) 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.btn-icon{background:none;border:1px solid var(--border);color:var(--muted);padding:9px;border-radius:10px;cursor:pointer;display:flex;align-items:center;transition:all .2s}
.btn-icon:hover{border-color:var(--accent2);color:var(--accent2)}
.btn-icon svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:none}
  .main{margin-left:0}
  .content{padding:20px}
  .stats-grid{grid-template-columns:1fr 1fr}
  .exam-card{flex-wrap:wrap}
}
</style>
</head>
<body>
<aside class="sidebar" id="sidebar">
  <a href="/" class="sidebar-logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/></svg></div>
    <span class="logo-text">Exalyte</span>
  </a>
  <nav class="sidebar-nav">
    <div class="nav-section">
      <div class="nav-section-label">Main</div>
      <a href="dashboard.html" class="nav-item active">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </a>
      <a href="exam-history.html" class="nav-item">
        <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        Exam History
      </a>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">Account</div>
      <button class="nav-item" onclick="logout()">
        <svg viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
        Sign Out
      </button>
    </div>
  </nav>
  <div class="sidebar-footer">
    <div class="user-card">
      <div class="user-avatar" id="userAvatar">?</div>
      <div class="user-info">
        <div class="user-name" id="userName">Loading...</div>
        <div class="user-role">Student</div>
      </div>
    </div>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <span class="topbar-title">Dashboard</span>
    <div class="topbar-actions">
      <a href="exam-history.html" class="btn-icon" title="Exam History">
        <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      </a>
    </div>
  </div>

  <div class="content">
    <!-- Stats -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <div class="stat-icon"><svg viewBox="0 0 24 24"><path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg></div>
        <div class="stat-value" id="statTotal">—</div>
        <div class="stat-label">Available Exams</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><svg viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
        <div class="stat-value" id="statCompleted">—</div>
        <div class="stat-label">Completed</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><svg viewBox="0 0 24 24"><path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg></div>
        <div class="stat-value" id="statBest">—</div>
        <div class="stat-label">Best Score</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><svg viewBox="0 0 24 24"><path d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
        <div class="stat-value" id="statPractice">—</div>
        <div class="stat-label">Practice Available</div>
      </div>
    </div>

    <!-- Live Strip -->
    <div class="live-strip" id="liveStrip">
      <div class="live-strip-header">
        <span class="live-badge"><span class="live-dot"></span>Live</span>
        <span class="live-strip-title">Happening Now</span>
      </div>
      <div class="live-exams-list" id="liveExamsList"></div>
    </div>

    <!-- Rankings Preview -->
    <div id="rankingsSection" style="display:none;margin-bottom:32px">
      <div class="section-header">
        <span class="section-title">My Rankings</span>
        <a href="exam-history.html" class="section-link">View All <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></a>
      </div>
      <div class="rankings-grid" id="rankingsGrid"></div>
    </div>

    <!-- Filters -->
    <div class="section-header">
      <span class="section-title">All Exams</span>
    </div>
    <div class="filters" style="margin-bottom:20px">
      <input type="text" class="search-box" id="searchBox" placeholder="Search exams..." oninput="filterExams()">
      <button class="filter-btn active" data-filter="all" onclick="setFilter(this)">All</button>
      <button class="filter-btn" data-filter="free" onclick="setFilter(this)">Free</button>
      <button class="filter-btn" data-filter="premium" onclick="setFilter(this)">Premium</button>
      <button class="filter-btn" data-filter="live" onclick="setFilter(this)">Live Now</button>
      <button class="filter-btn" data-filter="completed" onclick="setFilter(this)">Completed</button>
    </div>

    <div id="examsContainer"><div class="skeleton" style="height:80px;margin-bottom:10px"></div><div class="skeleton" style="height:80px;margin-bottom:10px"></div><div class="skeleton" style="height:80px"></div></div>
  </div>
</div>

<script>
const API = '/api';
const token = localStorage.getItem('exalyte_token');
const user = JSON.parse(localStorage.getItem('exalyte_user') || 'null');

if (!token || !user) { window.location.href = 'index.html'; }
if (user && user.is_admin) { window.location.href = 'admin.html'; }

document.getElementById('userName').textContent = user?.name || '';
document.getElementById('userAvatar').textContent = (user?.name || '?')[0].toUpperCase();

let allExams = [], activeFilter = 'all', countdowns = {};

async function loadDashboard() {
  try {
    const res = await fetch(`${API}/exams/`, { headers: { Authorization: `Bearer ${token}` } });
    if (res.status === 401) { logout(); return; }
    allExams = await res.json();
    updateStats();
    renderLiveStrip();
    renderRankings();
    renderExams();
  } catch(e) {
    document.getElementById('examsContainer').innerHTML = '<div class="empty-state"><p>Failed to load exams. Please refresh.</p></div>';
  }
}

function updateStats() {
  document.getElementById('statTotal').textContent = allExams.length;
  const completed = allExams.filter(e => e.stored_attempt).length;
  document.getElementById('statCompleted').textContent = completed;
  const best = allExams.filter(e => e.stored_attempt).reduce((m, e) => Math.max(m, e.stored_attempt.percentage), 0);
  document.getElementById('statBest').textContent = completed ? best.toFixed(0) + '%' : '—';
  const practice = allExams.filter(e => e.can_practice).length;
  document.getElementById('statPractice').textContent = practice || 'None';
}

function renderLiveStrip() {
  const liveExams = allExams.filter(e => e.is_live && !e.stored_attempt && e.accessible);
  const strip = document.getElementById('liveStrip');
  if (!liveExams.length) { strip.classList.remove('visible'); return; }
  strip.classList.add('visible');
  document.getElementById('liveExamsList').innerHTML = liveExams.map(e => `
    <div class="live-exam-item">
      <div>
        <div class="live-exam-name">${esc(e.name)}</div>
        <div class="live-exam-countdown" id="cd_${e.id}">${formatTime(e.live_seconds_remaining)}</div>
      </div>
      <button class="btn-live" onclick="takeExam(${e.id}, false)">Take Live Exam</button>
    </div>
  `).join('');
  liveExams.forEach(e => startCountdown(e.id, e.live_seconds_remaining));
}

function startCountdown(id, seconds) {
  let rem = seconds;
  if (countdowns[id]) clearInterval(countdowns[id]);
  countdowns[id] = setInterval(() => {
    rem--;
    const el = document.getElementById('cd_' + id);
    if (el) el.textContent = formatTime(rem);
    if (rem <= 0) { clearInterval(countdowns[id]); loadDashboard(); }
  }, 1000);
}

function formatTime(s) {
  if (s <= 0) return 'Ended';
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
  if (h > 0) return `${h}h ${m}m ${sec}s`;
  return `${m}m ${sec}s`;
}

async function renderRankings() {
  const completed = allExams.filter(e => e.stored_attempt);
  if (!completed.length) return;
  const section = document.getElementById('rankingsSection');
  section.style.display = 'block';
  const grid = document.getElementById('rankingsGrid');
  const top = completed.slice(0, 4);
  const rows = await Promise.all(top.map(async e => {
    try {
      const r = await fetch(`${API}/leaderboard/${e.id}`, { headers: { Authorization: `Bearer ${token}` } });
      const lb = await r.json();
      return { exam: e, lb };
    } catch { return { exam: e, lb: null }; }
  }));
  grid.innerHTML = rows.map(({ exam, lb }, i) => {
    const badgeClass = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : 'rn';
    const rank = lb?.rank || '—';
    return `
    <div class="rank-item">
      <div class="rank-badge ${badgeClass}">#${rank}</div>
      <div class="rank-info">
        <div class="rank-exam">${esc(exam.name)}</div>
        <div class="rank-meta">${lb ? `${lb.total_participants} participants · Top ${lb.percentile}%` : 'Loading...'}</div>
      </div>
      <div class="rank-perc">${exam.stored_attempt?.percentage?.toFixed(0) || 0}%</div>
    </div>`;
  }).join('');
}

function renderExams() {
  const q = document.getElementById('searchBox').value.toLowerCase();
  let filtered = allExams.filter(e => {
    const matchQ = !q || e.name.toLowerCase().includes(q) || (e.description || '').toLowerCase().includes(q);
    if (!matchQ) return false;
    if (activeFilter === 'free') return !e.is_premium;
    if (activeFilter === 'premium') return e.is_premium;
    if (activeFilter === 'live') return e.is_live;
    if (activeFilter === 'completed') return !!e.stored_attempt;
    return true;
  });

  // Group by batch
  const groups = {};
  filtered.forEach(e => {
    const key = e.batch_id ? (e.batch_name || 'Unnamed Batch') : '__ungrouped__';
    if (!groups[key]) groups[key] = [];
    groups[key].push(e);
  });

  if (!filtered.length) {
    document.getElementById('examsContainer').innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24"><path d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <h3>No exams found</h3>
        <p>Try adjusting your search or filters.</p>
      </div>`;
    return;
  }

  let html = '';
  Object.entries(groups).forEach(([batchName, exams]) => {
    if (batchName !== '__ungrouped__') {
      html += `<div class="batch-group"><div class="batch-header" onclick="toggleBatch(this)">
        <svg class="batch-toggle" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        <span class="batch-name">${esc(batchName)}</span>
        <span class="batch-count">${exams.length}</span>
      </div><div class="exams-list">${exams.map(examCard).join('')}</div></div>`;
    }
  });
  if (groups.__ungrouped__) {
    html += `<div class="batch-group">
      <div class="batch-header" onclick="toggleBatch(this)">
        <svg class="batch-toggle" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
        <span class="batch-name">Other Exams</span>
        <span class="batch-count">${groups.__ungrouped__.length}</span>
      </div>
      <div class="exams-list">${groups.__ungrouped__.map(examCard).join('')}</div>
    </div>`;
  }
  document.getElementById('examsContainer').innerHTML = html;
}

function examCard(e) {
  const typeBadge = e.is_live
    ? '<span class="exam-type-badge badge-live">Live</span>'
    : e.is_premium
    ? '<span class="exam-type-badge badge-premium">Premium</span>'
    : '<span class="exam-type-badge badge-free">Free</span>';

  const scoreHtml = e.stored_attempt
    ? `<div class="exam-score-badge"><span class="score">${e.stored_attempt.percentage.toFixed(0)}%</span></div>`
    : '';

  let actionHtml = '';
  if (!e.accessible) {
    actionHtml = `<button class="btn-locked"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>Locked</button>`;
  } else if (e.is_live && !e.stored_attempt) {
    actionHtml = `<button class="btn-take" onclick="takeExam(${e.id}, false)">Take Live Exam</button>`;
  } else if (!e.is_live && !e.stored_attempt && !e.live_deadline_hours) {
    actionHtml = `<button class="btn-take" onclick="takeExam(${e.id}, false)">Start Exam</button>`;
  } else if (e.stored_attempt) {
    actionHtml = `<button class="btn-take" onclick="viewResult(${e.id}, ${e.stored_attempt.id})">View Result</button>`;
    if (e.can_practice) actionHtml += `<button class="btn-practice" onclick="takeExam(${e.id}, true)">Practice</button>`;
  } else if (e.live_deadline_hours && !e.is_live && !e.stored_attempt) {
    actionHtml = `<button class="btn-take" disabled>Exam Ended</button>`;
  }

  return `
  <div class="exam-card">
    <div style="flex:1">
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap">
        ${typeBadge}
        <span class="exam-name">${esc(e.name)}</span>
      </div>
      ${e.description ? `<div class="exam-desc">${esc(e.description)}</div>` : ''}
      <div class="exam-meta">
        <div class="exam-meta-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${e.time_limit}min</div>
        <div class="exam-meta-item"><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/></svg>${e.question_count} Qs</div>
        ${e.negative_marking > 0 ? `<div class="exam-meta-item" style="color:var(--error)"><svg viewBox="0 0 24 24"><path d="M20 12H4"/></svg>-${e.negative_marking} NM</div>` : ''}
      </div>
    </div>
    <div class="exam-actions">
      ${scoreHtml}
      ${actionHtml}
    </div>
  </div>`;
}

function toggleBatch(header) {
  header.closest('.batch-group').classList.toggle('collapsed');
}

function setFilter(btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.filter;
  renderExams();
}

function filterExams() { renderExams(); }

function takeExam(id, practice) {
  window.location.href = `exam.html?id=${id}&practice=${practice ? 1 : 0}`;
}

function viewResult(examId, attemptId) {
  window.location.href = `result.html?examId=${examId}&attemptId=${attemptId}`;
}

function logout() {
  localStorage.removeItem('exalyte_token');
  localStorage.removeItem('exalyte_user');
  window.location.href = 'index.html';
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadDashboard();
</script>
</body>
</html>
