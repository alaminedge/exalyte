<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Exam History — Exalyte</title>
<link rel="stylesheet" href="assets/main.css">
<style>
body{min-height:100vh}

.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:28px}
.sum-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;text-align:center;position:relative;overflow:hidden}
.sum-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.sum-val{font-family:'Lexend',sans-serif;font-size:1.9rem;font-weight:900;color:var(--text-bright);letter-spacing:-.03em}
.sum-lbl{font-size:.7rem;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:.07em;margin-top:3px}

/* History items */
.hist-list{display:flex;flex-direction:column;gap:12px}
.hist-item{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:20px;transition:all .2s}
.hist-item:hover{border-color:rgba(99,102,241,.3);transform:translateY(-1px);box-shadow:0 6px 24px var(--shadow)}
.hist-top{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:10px}
.hist-left{flex:1;min-width:0}
.hist-name{font-family:'Lexend',sans-serif;font-weight:700;font-size:.93rem;color:var(--text-bright);margin-bottom:4px;letter-spacing:-.01em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hist-meta-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hist-batch{font-size:.68rem;color:var(--muted);background:var(--surface2);border:1px solid var(--border);padding:2px 8px;border-radius:5px}
.hist-date{display:flex;align-items:center;gap:4px;font-size:.72rem;color:var(--muted)}
.hist-date svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2}
.hist-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.hist-perc{font-family:'Lexend',sans-serif;font-size:1.4rem;font-weight:900;letter-spacing:-.02em}

.hist-stats-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.hist-score{font-family:'JetBrains Mono',monospace;font-size:.82rem;font-weight:700;color:var(--text-bright)}
.hist-pbar{height:5px;background:var(--surface2);border-radius:3px;flex:1;min-width:60px;overflow:hidden}
.hist-pfill{height:100%;border-radius:3px;transition:width .6s ease}
.rank-pill{display:flex;align-items:center;gap:5px;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.22);padding:3px 9px;border-radius:7px;font-size:.72rem}
.rank-pill strong{font-family:'JetBrains Mono',monospace;font-size:.78rem;font-weight:700;color:var(--accent2)}
.perc-chip{font-size:.68rem;font-weight:700;color:var(--success);background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);padding:2px 8px;border-radius:5px}

.hist-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn-view{background:rgba(99,102,241,.12);color:var(--accent2);border:1px solid rgba(99,102,241,.28);padding:7px 14px;border-radius:9px;font-size:.76rem;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;display:inline-flex;align-items:center;gap:5px;text-decoration:none}
.btn-view:hover{background:rgba(99,102,241,.22)}
.btn-view svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.5}
.btn-prac{background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:7px 14px;border-radius:9px;font-size:.76rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;display:inline-flex;align-items:center;gap:5px;text-decoration:none}
.btn-prac:hover{border-color:var(--accent2);color:var(--accent2)}
.btn-prac svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.5}

.empty-state{text-align:center;padding:70px 20px;color:var(--muted)}
.empty-state svg{width:48px;height:48px;stroke:var(--muted);fill:none;stroke-width:1.5;margin:0 auto 16px;display:block;opacity:.3}
.empty-state h3{font-family:'Lexend',sans-serif;font-size:.95rem;font-weight:700;color:var(--text);margin-bottom:7px}
.empty-state p{font-size:.82rem;line-height:1.6;max-width:280px;margin:0 auto 22px}

/* Bottom nav */
.bottom-nav-items{display:flex}
.bottom-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;color:var(--muted);font-size:.62rem;font-weight:600;border:none;background:none;cursor:pointer;transition:color .2s;font-family:'Inter',sans-serif}
.bottom-nav-item.active{color:var(--accent2)}
.bottom-nav-item svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8}

@media(max-width:600px){
  .hist-top{flex-direction:column;gap:8px}
  .hist-right{flex-direction:row;align-items:center;width:100%;justify-content:space-between}
  .hist-actions{width:100%}
  .btn-view,.btn-prac{flex:1;justify-content:center;text-align:center}
}
</style>
</head>
<body class="app-layout">

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <a href="/" class="logo-wrap">
      <img src="images/exalyte.png" alt="Exalyte" class="logo-img">
      <span class="logo-text">Exalyte</span>
    </a>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">
      <div class="nav-section-label">Main</div>
      <a href="dashboard.html" class="nav-item">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard
      </a>
      <a href="exam-history.html" class="nav-item active">
        <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>Exam History
      </a>
    </div>
    <div class="nav-section">
      <div class="nav-section-label">Account</div>
      <button class="nav-item" onclick="logout()">
        <svg viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>Sign Out
      </button>
    </div>
  </nav>
  <div class="sidebar-footer">
    <div class="user-card">
      <div class="user-avatar" id="userAvatar">?</div>
      <div class="user-info">
        <div class="user-name" id="userName"></div>
        <div class="user-role">Student</div>
      </div>
    </div>
  </div>
</aside>

<div class="app-main">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px">
      <button class="hamburger" id="hamburger"><svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <span class="topbar-title">Exam History</span>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()"></button>
  </div>

  <div class="panel active">
    <div class="summary-grid">
      <div class="sum-card"><div class="sum-val" id="sTotal">—</div><div class="sum-lbl">Exams Taken</div></div>
      <div class="sum-card"><div class="sum-val" id="sAvg">—</div><div class="sum-lbl">Avg Score</div></div>
      <div class="sum-card"><div class="sum-val" id="sBest">—</div><div class="sum-lbl">Best Score</div></div>
      <div class="sum-card"><div class="sum-val" id="sRank">—</div><div class="sum-lbl">Best Rank</div></div>
    </div>

    <div class="hist-list" id="histList">
      <div class="skeleton" style="height:90px"></div>
      <div class="skeleton" style="height:90px;margin-top:12px"></div>
      <div class="skeleton" style="height:90px;margin-top:12px"></div>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <div class="bottom-nav-items">
    <button class="bottom-nav-item" onclick="window.location='dashboard.html'">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Home
    </button>
    <button class="bottom-nav-item active" onclick="window.location='exam-history.html'">
      <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>History
    </button>
    <button class="bottom-nav-item" onclick="toggleTheme()">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>Theme
    </button>
    <button class="bottom-nav-item" onclick="logout()">
      <svg viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>Sign Out
    </button>
  </div>
</div>

<script src="assets/main.js"></script>
<script>
if (!requireAuth()) throw '';
const user = getUser();
document.getElementById('userName').textContent  = user?.name || '';
document.getElementById('userAvatar').textContent = (user?.name || '?')[0].toUpperCase();

async function load() {
  try {
    const { ok, data } = await apiFetch('/history');
    if (!ok) { logout(); return; }

    // Summary
    document.getElementById('sTotal').textContent = data.length;
    if (data.length) {
      const avg  = data.reduce((s, h) => s + h.percentage, 0) / data.length;
      const best = Math.max(...data.map(h => h.percentage));
      const bestRank = Math.min(...data.filter(h => h.rank).map(h => h.rank));
      document.getElementById('sAvg').textContent  = avg.toFixed(0) + '%';
      document.getElementById('sBest').textContent = best.toFixed(0) + '%';
      document.getElementById('sRank').textContent = bestRank < 9999 ? '#' + bestRank : '—';
    } else {
      ['sAvg','sBest','sRank'].forEach(id => document.getElementById(id).textContent = '—');
    }

    if (!data.length) {
      document.getElementById('histList').innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
          <h3>No exams taken yet</h3>
          <p>Complete your first exam to see your history here.</p>
          <a href="dashboard.html" class="btn btn-primary">Go to Dashboard</a>
        </div>`;
      return;
    }

    document.getElementById('histList').innerHTML = data.map(h => {
      const perc  = h.percentage || 0;
      const color = perc >= 80 ? 'var(--success)' : perc >= 60 ? 'var(--premium)' : perc >= 40 ? 'var(--warning)' : 'var(--error)';
      return `
      <div class="hist-item">
        <div class="hist-top">
          <div class="hist-left">
            <div class="hist-name">${esc(h.exam_name)}</div>
            <div class="hist-meta-row">
              ${h.batch_name ? `<span class="hist-batch">${esc(h.batch_name)}</span>` : ''}
              <span class="hist-date"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${formatDate(h.submitted_at)}</span>
            </div>
          </div>
          <div class="hist-right">
            <div class="hist-perc" style="color:${color}">${perc.toFixed(0)}%</div>
          </div>
        </div>
        <div class="hist-stats-row">
          <span class="hist-score">${h.score}/${h.total_questions} correct</span>
          <div class="hist-pbar"><div class="hist-pfill" style="width:${perc}%;background:${color}"></div></div>
          ${h.rank ? `<div class="rank-pill"><strong>#${h.rank}</strong><span style="color:var(--muted);font-size:.68rem">/ ${h.total_participants}</span></div>` : ''}
          ${h.percentile ? `<span class="perc-chip">Top ${h.percentile}%</span>` : ''}
        </div>
        <div class="hist-actions">
          <a href="result.html?examId=${h.exam_id}&attemptId=${h.id}" class="btn-view">
            <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>View Result
          </a>
          <a href="exam.html?id=${h.exam_id}&practice=1" class="btn-prac">
            <svg viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>Practice
          </a>
        </div>
      </div>`;
    }).join('');
  } catch {
    document.getElementById('histList').innerHTML = '<p style="color:var(--error);text-align:center;padding:40px">Failed to load history. Please refresh.</p>';
  }
}

load();
</script>
</body>
</html>
