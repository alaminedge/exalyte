<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Result — Exalyte</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
:root{
  --blue:#1a73e8;--blue-h:#1557b0;--red:#d93025;--red-bg:#fce8e6;
  --green:#1e8e3e;--grn-bg:#e6f4ea;--yellow:#f9ab00;--yel-bg:#fef7e0;
  --bg:#f8f9fa;--surf:#ffffff;--hov:#f1f3f4;--border:#dadce0;
  --t1:#202124;--t2:#3c4043;--t3:#5f6368;--t4:#80868b;
  --gs:'Google Sans','Roboto',system-ui,sans-serif;
  --rb:'Roboto',system-ui,sans-serif;
  --hh:64px;--r:4px;--rl:8px;--tr:.2s cubic-bezier(.4,0,.2,1);
}
body{
  font-family:var(--rb);background:var(--bg);color:var(--t2);
  -webkit-font-smoothing:antialiased;line-height:1.5;min-height:100vh;
  display:flex;flex-direction:column;overflow-x:hidden;
}
.header{
  position:fixed;top:0;left:0;right:0;height:var(--hh);
  background:var(--surf);border-bottom:1px solid var(--border);
  z-index:1000;display:flex;align-items:center;
  justify-content:space-between;padding:0 24px;
  transition:transform .25s ease;
}
.header.hidden{transform:translateY(-100%)}
.header-left{display:flex;align-items:center;gap:24px}
.logo-wrap{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-img{width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0}
.logo-text{font-family:var(--gs);font-size:1.25rem;font-weight:500;color:var(--t1);letter-spacing:-0.2px}
.header-nav{display:flex;align-items:center;gap:4px}
.header-nav a{
  font-family:var(--gs);font-size:.875rem;font-weight:500;color:var(--t3);
  text-decoration:none;padding:8px 16px;border-radius:var(--r);
  transition:all var(--tr);
}
.header-nav a:hover{background:var(--hov);color:var(--t1)}

.hamburger{
  display:none;background:none;border:none;cursor:pointer;
  color:var(--t3);padding:8px;border-radius:50%;
  align-items:center;justify-content:center;transition:background var(--tr);
}
.hamburger:hover{background:var(--hov)}
.hamburger svg{width:22px;height:22px}

.mobile-nav-dropdown{
  display:none;position:fixed;top:var(--hh);left:0;right:0;
  background:var(--surf);border-bottom:1px solid var(--border);
  box-shadow:0 4px 16px rgba(0,0,0,.1);padding:8px 16px;z-index:999;
}
.mobile-nav-dropdown.show{display:block}
.mobile-nav-dropdown a{
  display:block;padding:12px 16px;font-family:var(--gs);font-size:.9rem;
  color:var(--t2);text-decoration:none;border-radius:var(--r);
}
.mobile-nav-dropdown a:hover{background:var(--hov)}

.header-right{display:flex;align-items:center;gap:8px}
.icon-btn{
  width:40px;height:40px;border:none;background:none;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--t3);transition:background var(--tr);flex-shrink:0;
}
.icon-btn:hover{background:var(--hov)}
.icon-btn svg{width:20px;height:20px}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:8px 18px;font-family:var(--gs);font-size:.85rem;font-weight:500;
  border:none;border-radius:var(--r);cursor:pointer;
  transition:all var(--tr);text-decoration:none;white-space:nowrap;
}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:var(--blue-h)}
.btn-outline{background:transparent;color:var(--blue);border:1px solid var(--border)}
.btn-outline:hover{background:#e8f0fe;border-color:var(--blue)}
.main{flex:1;padding-top:var(--hh)}
.content{max-width:860px;margin:0 auto;padding:32px 24px 60px;width:100%}

.loading-state{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:16px;color:var(--t3)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.score-card{
  background:var(--surf);border:1px solid var(--border);border-radius:var(--rl);
  padding:36px 28px;text-align:center;margin-bottom:20px;
}
.score-ring-wrap{width:120px;height:120px;margin:0 auto 16px;position:relative}
.score-ring-wrap svg{transform:rotate(-90deg);width:120px;height:120px}
.ring-bg{fill:none;stroke:var(--hov);stroke-width:8}
.ring-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:339;stroke-dashoffset:339;transition:stroke-dashoffset 1.4s ease}
.ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-family:var(--gs);font-size:1.8rem;font-weight:500;color:var(--t1)}
.ring-lbl{font-size:.6rem;color:var(--t4);text-transform:uppercase;letter-spacing:.5px;font-weight:500;margin-top:2px}
.score-grade{font-family:var(--gs);font-size:1.2rem;font-weight:500;margin-bottom:4px}
.score-exam{font-size:.82rem;color:var(--t3);margin-bottom:20px}
.score-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:360px;margin:0 auto 18px}
.sc-stat{background:var(--bg);border-radius:var(--r);padding:12px 8px;text-align:center}
.sc-stat-val{font-family:var(--gs);font-size:1.3rem;font-weight:500}
.sc-stat-lbl{font-size:.6rem;color:var(--t4);text-transform:uppercase;letter-spacing:.5px;font-weight:500;margin-top:2px}
.sc-correct .sc-stat-val{color:var(--green)}
.sc-wrong .sc-stat-val{color:var(--red)}
.sc-skip .sc-stat-val{color:var(--t3)}
.perf-bar{height:6px;background:var(--hov);border-radius:4px;max-width:360px;margin:0 auto 20px;overflow:hidden}
.perf-fill{height:100%;border-radius:4px;width:0;transition:width 1.4s ease}
.result-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

.lb-card{
  background:var(--surf);border:1px solid var(--border);border-radius:var(--rl);
  padding:20px;margin-bottom:20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;
}
.lb-badge{
  width:56px;height:56px;border-radius:50%;background:var(--blue);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  flex-shrink:0;
}
.lb-rank{font-family:var(--gs);font-size:1.1rem;font-weight:500;color:#fff}
.lb-lbl{font-size:.5rem;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.5px;font-weight:500}
.lb-info{flex:1;min-width:140px}
.lb-title{font-family:var(--gs);font-size:.88rem;font-weight:500;color:var(--t1)}
.lb-sub{font-size:.76rem;color:var(--t3)}
.lb-pct{text-align:right}
.lb-pct-val{font-family:var(--gs);font-size:1.5rem;font-weight:500;color:var(--blue)}
.lb-pct-lbl{font-size:.6rem;color:var(--t4);text-transform:uppercase;letter-spacing:.5px;font-weight:500}

.pending-card{
  background:var(--surf);border:1px solid var(--border);border-radius:var(--rl);
  padding:48px 28px;text-align:center;margin-bottom:20px;
}
.pending-icon{
  width:56px;height:56px;border-radius:50%;background:var(--yel-bg);
  display:flex;align-items:center;justify-content:center;margin:0 auto 14px;
}
.pending-icon svg{width:24px;height:24px;stroke:#e37400;fill:none;stroke-width:2}
.pending-title{font-family:var(--gs);font-size:1.1rem;font-weight:500;color:#e37400;margin-bottom:6px}
.pending-sub{font-size:.85rem;color:var(--t3);max-width:400px;margin:0 auto 20px;line-height:1.6}

.review-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.review-head h2{font-family:var(--gs);font-size:1.1rem;font-weight:500;color:var(--t1)}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{
  padding:5px 14px;border:1px solid var(--border);border-radius:20px;
  font-family:var(--gs);font-size:.72rem;font-weight:500;color:var(--t3);
  background:var(--surf);cursor:pointer;transition:all var(--tr);
}
.chip:hover{border-color:var(--blue);color:var(--blue)}
.chip.active{background:#e8f0fe;color:var(--blue);border-color:var(--blue)}

.review-list{display:flex;flex-direction:column;gap:8px}
.rv-card{background:var(--surf);border:2px solid var(--border);border-radius:var(--rl);overflow:hidden}
.rv-card.rv-correct{border-color:rgba(30,142,62,.4)}
.rv-card.rv-wrong{border-color:rgba(217,48,37,.3)}
.rv-header{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;user-select:none}
.rv-status{
  width:26px;height:26px;border-radius:50%;display:flex;
  align-items:center;justify-content:center;flex-shrink:0;
}
.rv-status svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2.5}
.rv-correct .rv-status{background:var(--grn-bg);color:var(--green)}
.rv-wrong .rv-status{background:var(--red-bg);color:var(--red)}
.rv-skip .rv-status{background:var(--hov);color:var(--t3)}
.rv-q{font-size:.84rem;color:var(--t2);flex:1;line-height:1.5}
.rv-q-img{max-width:100%;max-height:140px;border-radius:var(--r);margin-top:6px;border:1px solid var(--border);object-fit:contain}
.rv-arrow{width:16px;height:16px;stroke:var(--t3);fill:none;stroke-width:2;flex-shrink:0;transition:transform .2s}
.rv-card.open .rv-arrow{transform:rotate(180deg)}
.rv-body{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
.rv-card.open .rv-body{display:block}
.rv-opts{display:flex;flex-direction:column;gap:6px;margin-top:12px}
.rv-opt{
  display:flex;align-items:flex-start;gap:8px;padding:8px 12px;
  border-radius:var(--r);background:var(--bg);border:1.5px solid var(--border);
  font-size:.8rem;color:var(--t2);line-height:1.4;
}
.rv-opt.rv-opt-correct{background:var(--grn-bg);border-color:rgba(30,142,62,.4);color:var(--green)}
.rv-opt.rv-opt-wrong{background:var(--red-bg);border-color:rgba(217,48,37,.3);color:var(--red)}
.rv-ol{
  width:22px;height:22px;border-radius:50%;display:flex;
  align-items:center;justify-content:center;
  font-family:var(--gs);font-size:.7rem;font-weight:500;flex-shrink:0;
}
.rv-opt-correct .rv-ol{background:rgba(30,142,62,.2);color:var(--green)}
.rv-opt-wrong .rv-ol{background:rgba(217,48,37,.15);color:var(--red)}
.rv-opt-img{max-width:100%;max-height:120px;border-radius:var(--r);border:1px solid var(--border);object-fit:contain}
.rv-ans-note{font-size:.68rem;font-weight:500;color:var(--t4);text-transform:uppercase;letter-spacing:.3px;margin-top:10px}
.rv-explanation{
  margin-top:10px;padding:10px 14px;background:#e8f0fe;
  border:1px solid rgba(26,115,232,.2);border-radius:var(--r);
  font-size:.78rem;color:var(--blue);line-height:1.6;
}
.rv-explanation strong{color:var(--t1);display:block;margin-bottom:3px;font-size:.68rem;text-transform:uppercase;letter-spacing:.3px}
.rv-explanation-img{max-width:100%;max-height:200px;border-radius:var(--r);margin-top:10px;border:1px solid var(--border);object-fit:contain}
.empty-review{text-align:center;padding:40px;color:var(--t3);font-size:.82rem}

.footer{background:var(--surf);border-top:1px solid var(--border);margin-top:auto}
.footer-inner{
  max-width:1080px;margin:0 auto;padding:40px 24px 24px;
  display:grid;grid-template-columns:2fr 1fr 1fr;gap:40px;
}
.fc h4{font-family:var(--gs);font-size:.875rem;font-weight:500;color:var(--t2);margin-bottom:12px}
.fc p{font-size:.8rem;color:var(--t3);line-height:1.7}
.fc a{display:block;font-size:.8rem;color:var(--t3);text-decoration:none;line-height:2}
.fc a:hover{color:var(--blue);text-decoration:underline}
.footer-brand{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.footer-bottom{
  max-width:1080px;margin:0 auto;padding:16px 24px;
  border-top:1px solid var(--border);display:flex;
  justify-content:space-between;align-items:center;
  font-size:.75rem;color:var(--t4);flex-wrap:wrap;gap:8px;
}
.footer-links{display:flex;gap:20px}
.footer-links a{color:var(--t4);text-decoration:none;font-size:.75rem}
.footer-links a:hover{text-decoration:underline;color:var(--blue)}

@media(max-width:900px){
  .header{padding:0 16px}
  .header-nav{display:none}
  .hamburger{display:flex}
  .content{padding:24px 16px 80px}
  .score-card{padding:28px 20px}
  .score-ring-wrap{width:100px;height:100px}
  .score-ring-wrap svg{width:100px;height:100px}
  .ring-pct{font-size:1.4rem}
  .lb-card{padding:16px}
  .lb-badge{width:48px;height:48px}
  .lb-pct{text-align:left}
  .review-head{flex-direction:column;align-items:flex-start}
  .footer-inner{grid-template-columns:1fr 1fr;gap:28px}
}
@media(max-width:600px){
  .score-stats{grid-template-columns:1fr 1fr}
  .score-stats .sc-stat:last-child{grid-column:span 2}
  .result-actions .btn{flex:1;justify-content:center}
  .rv-header{padding:12px 14px}
  .rv-q{font-size:.78rem}
  .rv-body{padding:0 14px 14px}
  .rv-opt{font-size:.75rem;padding:6px 10px}
  .footer-inner{grid-template-columns:1fr;gap:20px}
  .footer-bottom{flex-direction:column;text-align:center}
}
</style>
</head>

<main class="main">
  <div class="content">

    <div id="loadingState" class="loading-state">
      <div class="spinner"></div>
      <span>Loading your result...</span>

<footer class="footer">

<script>
const API = '/api';

function getToken(){return localStorage.getItem('exalyte_token')}
function getUser(){return JSON.parse(localStorage.getItem('exalyte_user')||'null')}
function logout(){localStorage.clear();window.location.href='/'}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function formatDate(iso){return iso?new Date(iso).toLocaleDateString():'—'}

// Helper: check if a string is an image URL
function isImageURL(str){
  if(!str)return false;
  const s=str.trim();
  return (s.startsWith('http')&&(s.includes('.jpg')||s.includes('.jpeg')||s.includes('.png')||s.includes('.webp')||s.includes('.gif')||s.includes('ibb.co')||s.includes('images.unsplash.com')||s.includes('i.imgur.com')));
}

// Render option content: text or image
function renderOptionContent(text){
  if(isImageURL(text)){
    return`<img src="${esc(text)}" class="rv-opt-img" alt="Option" onerror="this.style.display='none'">`;
  }
  return esc(text||'');
}

// Render explanation content: text or image
function renderExplanationContent(text){
  if(!text)return'';
  if(isImageURL(text)){
    return`<img src="${esc(text)}" class="rv-explanation-img" alt="Explanation" onerror="this.style.display='none'">`;
  }
  return esc(text);
}

async function apiFetch(path,opts={}){
  const token=getToken();
  const headers={'Content-Type':'application/json',...(token?{Authorization:`Bearer ${token}`}:{})};
  try{
    const res=await fetch(API+path,{...opts,headers});
    const text=await res.text();
    if(!text||text.trim()==='')return{ok:false,data:{error:'Empty response from server'}};
    try{const data=JSON.parse(text);return{ok:res.ok,data}}
    catch(e){return{ok:false,data:{error:text.substring(0,200)}}}
  }catch(error){return{ok:false,data:{error:error.message||'Network error'}}}
}

const params=new URLSearchParams(location.search);
const examId=params.get('examId');
const attemptId=params.get('attemptId');
const isPractice=params.get('practice')==='1';
const urlScore=params.get('score');
const urlCorrect=params.get('correct');
const urlWrong=params.get('wrong');
const urlSkipped=params.get('skipped');

if(!examId)window.location.href='dashboard.html';
if(!attemptId&&!isPractice)window.location.href='dashboard.html';
if(!getToken())window.location.href='/';

let attempt,questions,exam,userAnswers={},reviewFilter='all';
let isUrlMode=false;

const header=document.getElementById('header');
let lastY=0,ticking=false;
window.addEventListener('scroll',()=>{if(!ticking){requestAnimationFrame(()=>{const y=window.scrollY;header.classList.toggle('hidden',y>lastY&&y>80);lastY=y;ticking=false});ticking=true}},{passive:true});

function toggleMobileNav(){
  document.getElementById('mobileNavDropdown').classList.toggle('show');
}
document.addEventListener('click',function(e){
  const dd=document.getElementById('mobileNavDropdown');
  const hb=document.getElementById('hamburger');
  if(dd&&!dd.contains(e.target)&&!hb.contains(e.target))dd.classList.remove('show');
});

function gradeInfo(pct){
  if(pct>=90)return{label:'Outstanding',color:'#1e8e3e'};
  if(pct>=80)return{label:'Excellent',color:'#1e8e3e'};
  if(pct>=60)return{label:'Good',color:'#1a73e8'};
  if(pct>=40)return{label:'Needs Work',color:'#f9ab00'};
  return{label:'Keep Trying',color:'#d93025'};
}

async function loadResult(){
  if(isPractice&&urlScore){
    isUrlMode=true;
    document.getElementById('loadingState').style.display='none';
    document.getElementById('resultWrap').style.display='block';
    try{
      const{ok,data}=await apiFetch('/exams/'+examId+'/questions');
      if(ok){questions=data.questions||[]}
    }catch(e){}
    showUrlPracticeResult();
    return;
  }
  
  try{
    document.getElementById('loadingState').style.display='flex';
    document.getElementById('resultWrap').style.display='none';
    
    const result=await apiFetch('/exams/'+examId+'/result/'+attemptId);
    
    document.getElementById('loadingState').style.display='none';
    document.getElementById('resultWrap').style.display='block';
    
    if(!result.ok||result.data.pending){
      const msg=result.data?.message||result.data?.error||'Results will be available after publication.';
      document.getElementById('resultWrap').innerHTML=`
        <div class="pending-card">
          <div class="pending-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
          <div class="pending-title">Results Pending</div>
          <div class="pending-sub">${esc(msg)}</div>
          <a href="dashboard.html" class="btn btn-primary">Back to Dashboard</a>
        </div>`;
      return;
    }
    
    const data=result.data;
    if(!data.attempt||!data.questions){
      document.getElementById('resultWrap').innerHTML=`
        <div class="pending-card">
          <div class="pending-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
          <div class="pending-title">No Results Found</div>
          <div class="pending-sub">We couldn't find your result. Please try again or contact support.</div>
          <a href="dashboard.html" class="btn btn-primary">Back to Dashboard</a>
        </div>`;
      return;
    }
    
    attempt=data.attempt;
    questions=data.questions||[];
    exam=data.exam;
    
    if(typeof attempt.answers==='string'){
      try{userAnswers=JSON.parse(attempt.answers||'{}')}catch(e){userAnswers={}}
    }else{
      userAnswers=attempt.answers||{};
    }
    
    let correct=0,wrong=0,skipped=0;
    questions.forEach(q=>{
      const ansData=userAnswers[q.id];
      if(!ansData||typeof ansData==='object'){
        const given=ansData?.given||'';
        if(!given)skipped++;
        else if(given===q.correct_answer)correct++;
        else wrong++;
      }else if(typeof ansData==='string'){
        if(!ansData)skipped++;
        else if(ansData===q.correct_answer)correct++;
        else wrong++;
      }else{
        skipped++;
      }
    });
    
    const pct=attempt.percentage||0;
    const grade=gradeInfo(pct);
    
    let html=`
    <div class="score-card">
      <div class="score-ring-wrap">
        <svg viewBox="0 0 120 120">
          <circle class="ring-bg" cx="60" cy="60" r="54"/>
          <circle class="ring-fill" id="scRing" cx="60" cy="60" r="54" stroke="${grade.color}" style="stroke-dasharray:339;stroke-dashoffset:${339-(pct/100)*339}"/>
        </svg>
        <div class="ring-inner">
          <div class="ring-pct">${pct.toFixed(1)}%</div>
          <div class="ring-lbl">Score</div>
        </div>
      </div>
      <div class="score-grade" style="color:${grade.color}">${grade.label}</div>
      <div class="score-exam">${esc(exam.name)}${attempt.is_practice?' — Practice':''}</div>
      <div class="score-stats">
        <div class="sc-stat sc-correct"><div class="sc-stat-val">${correct}</div><div class="sc-stat-lbl">Correct</div></div>
        <div class="sc-stat sc-wrong"><div class="sc-stat-val">${wrong}</div><div class="sc-stat-lbl">Wrong</div></div>
        <div class="sc-stat sc-skip"><div class="sc-stat-val">${skipped}</div><div class="sc-stat-lbl">Skipped</div></div>
      </div>
      <div class="perf-bar"><div class="perf-fill" style="width:${Math.max(pct,2)}%;background:${grade.color}"></div></div>
      <div class="result-actions">
        <a href="dashboard.html" class="btn btn-outline"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
        ${!attempt.is_practice&&exam.allow_practice?`<a href="exam.html?id=${examId}&practice=1" class="btn btn-primary"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>Practice Mode</a>`:''}
      </div>
    </div>`;
    
    if(!attempt.is_practice){
      try{
        const lbRes=await apiFetch('/leaderboard/'+examId);
        if(lbRes.ok&&lbRes.data?.rank&&!lbRes.data.disabled){
          const lb=lbRes.data;
          html+=`
          <div class="lb-card">
            <div class="lb-badge"><div class="lb-rank">#${lb.rank}</div><div class="lb-lbl">Rank</div></div>
            <div class="lb-info"><div class="lb-title">Your Leaderboard Position</div><div class="lb-sub">Out of ${lb.total_participants} participant${lb.total_participants!==1?'s':''}</div></div>
            <div class="lb-pct"><div class="lb-pct-val">Top ${lb.percentile}%</div><div class="lb-pct-lbl">Percentile</div></div>
          </div>`;
        }
      }catch(e){}
    }
    
    html+=`
    <div class="review-head">
      <h2>Question Review</h2>
      <div class="chips">
        <button class="chip active" data-f="all" onclick="setFilter(this,'all')">All</button>
        <button class="chip" data-f="correct" onclick="setFilter(this,'correct')">Correct</button>
        <button class="chip" data-f="wrong" onclick="setFilter(this,'wrong')">Wrong</button>
        <button class="chip" data-f="skipped" onclick="setFilter(this,'skipped')">Skipped</button>
      </div>
    </div>
    <div class="review-list" id="reviewList"></div>`;
    
    document.getElementById('resultWrap').innerHTML=html;
    renderReview();
    
  }catch(e){
    document.getElementById('loadingState').style.display='none';
    document.getElementById('resultWrap').style.display='block';
    document.getElementById('resultWrap').innerHTML=`
      <div class="pending-card">
        <div class="pending-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
        <div class="pending-title">Something went wrong</div>
        <div class="pending-sub">${esc(e.message||'Failed to load result.')}</div>
        <a href="dashboard.html" class="btn btn-primary">Back to Dashboard</a>
      </div>`;
  }
}

  const score=parseInt(urlScore)||0;
  const total=10;

  const correct=parseInt(urlCorrect)||0;
  const wrong=parseInt(urlWrong)||0;
  const skipped=parseInt(urlSkipped)||0;

  let html=`
  <div class="score-card">
    <div class="score-ring-wrap">
      <svg viewBox="0 0 120 120">
        <circle class="ring-bg" cx="60" cy="60" r="54"/>
        <circle class="ring-fill" cx="60" cy="60" r="54" stroke="${grade.color}" style="stroke-dasharray:339;stroke-dashoffset:${339-(percentage/100)*339}"/>
      </svg>
      <div class="ring-inner">
        <div class="ring-pct">${percentage.toFixed(1)}%</div>
        <div class="ring-lbl">Score</div>
      </div>

    <div class="score-grade" style="color:${grade.color}">${grade.label}</div>
    <div class="score-exam">Practice Result</div>
    <div class="score-stats">
      <div class="sc-stat sc-correct"><div class="sc-stat-val">${correct}</div><div class="sc-stat-lbl">Correct</div></div>
      <div class="sc-stat sc-wrong"><div class="sc-stat-val">${wrong}</div><div class="sc-stat-lbl">Wrong</div></div>
      <div class="sc-stat sc-skip"><div class="sc-stat-val">${skipped}</div><div class="sc-stat-lbl">Skipped</div></div>
    </div>
    <div class="perf-bar"><div class="perf-fill" style="width:${Math.max(percentage,2)}%;background:${grade.color}"></div></div>
    <div class="result-actions">

function renderReview(){
  const filtered=questions.filter(q=>{
    const ansData=userAnswers[q.id];
    const given=(typeof ansData==='object'?ansData?.given:'')||(typeof ansData==='string'?ansData:'')||'';
    if(reviewFilter==='correct')return given===q.correct_answer;
    if(reviewFilter==='wrong')return given&&given!==q.correct_answer;
    if(reviewFilter==='skipped')return!given;
    return true;
  });
  
  if(!filtered.length){
    document.getElementById('reviewList').innerHTML='<div class="empty-review">No questions in this filter.</div>';
    return;
  }
  
  const icons={
    correct:'<polyline points="20 6 9 17 4 12"/>',
    wrong:'<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
    skipped:'<circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/>'
  };
  
  document.getElementById('reviewList').innerHTML=filtered.map(q=>{
    const ansData=userAnswers[q.id];
    const given=(typeof ansData==='object'?ansData?.given:'')||(typeof ansData==='string'?ansData:'')||'';
    const st=given===q.correct_answer?'correct':given?'wrong':'skip';
    const cls={correct:'rv-correct',wrong:'rv-wrong',skip:'rv-skip'}[st];
    
    const opts=['A','B','C','D'].map(l=>{
      const isCorrect=l===q.correct_answer;
      const isYours=l===given&&!isCorrect;
      const optCls=isCorrect?'rv-opt-correct':isYours?'rv-opt-wrong':'';
      const optText=q['option_'+l.toLowerCase()]||'';
      return`<div class="rv-opt ${optCls}"><div class="rv-ol">${l}</div><div style="flex:1;line-height:1.4">${renderOptionContent(optText)}</div></div>`;
    }).join('');
    
    let note='';
    if(given&&given!==q.correct_answer)note=`<div class="rv-ans-note">Your answer: ${given} — Correct: ${q.correct_answer}</div>`;
    else if(!given)note=`<div class="rv-ans-note" style="color:var(--t3)">Not answered — Correct: ${q.correct_answer}</div>`;
    
    let exp='';
    if(q.explanation&&q.explanation.trim()){
      exp=`<div class="rv-explanation">${renderExplanationContent(q.explanation)}</div>`;
    }
    
    return`<div class="rv-card ${cls}" id="rv${q.id}">
      <div class="rv-header" onclick="toggleReview('${q.id}')">
        <div class="rv-status"><svg viewBox="0 0 24 24">${icons[st]}</svg></div>
        <div class="rv-q">${esc(q.question_text||'')}${q.image_url?`<img src="${esc(q.image_url)}" class="rv-q-img" alt="">`:''}</div>
        <svg class="rv-arrow" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="rv-body">
        <div class="rv-opts">${opts}</div>
        ${note}${exp}
      </div>
    </div>`;
  }).join('');
}

function toggleReview(id){document.getElementById('rv'+id)?.classList.toggle('open')}
function setFilter(btn,filter){
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  reviewFilter=filter;
  renderReview();
}

loadResult();
</script>
