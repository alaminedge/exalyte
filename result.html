<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Result — Exalyte</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#05050a;--surface:#0a0a16;--surface2:#111122;--surface3:#16162a;
  --border:#1e1e38;--accent:#6366f1;--accent2:#818cf8;--accent3:#4f46e5;
  --text:#e9e9f0;--text-bright:#f5f5ff;--muted:#7c7c96;
  --error:#ef4444;--success:#22c55e;--warning:#f59e0b;--premium:#a855f7;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh}

/* Header */
.result-header{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:10;backdrop-filter:blur(20px)}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:.875rem;font-weight:500;transition:color .2s}
.back-btn:hover{color:var(--text)}
.back-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
.header-title{font-family:'Lexend',sans-serif;font-weight:700;font-size:1rem;color:var(--text-bright);flex:1;text-align:center}

.content{max-width:900px;margin:0 auto;padding:40px 24px}

/* Score card */
.score-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:48px;text-align:center;margin-bottom:32px;position:relative;overflow:hidden}
.score-card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 50% 30%,var(--glow-color,rgba(99,102,241,.08)),transparent 60%);pointer-events:none;transition:all 1s}
.score-circle{width:140px;height:140px;margin:0 auto 24px;position:relative}
.score-circle svg{transform:rotate(-90deg);width:140px;height:140px}
.score-circle-bg{fill:none;stroke:var(--surface2);stroke-width:8}
.score-circle-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:377;stroke-dashoffset:377;transition:stroke-dashoffset 1.5s cubic-bezier(.4,0,.2,1)}
.score-circle-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-perc{font-family:'Lexend',sans-serif;font-size:2rem;font-weight:900;color:var(--text-bright);letter-spacing:-.03em}
.score-label{font-size:.7rem;color:var(--muted);font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.score-title{font-family:'Lexend',sans-serif;font-size:1.5rem;font-weight:800;color:var(--text-bright);margin-bottom:8px;letter-spacing:-.02em}
.score-subtitle{font-size:.875rem;color:var(--muted);margin-bottom:32px}
.score-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:400px;margin:0 auto 32px}
.score-stat{background:var(--surface2);border-radius:12px;padding:16px}
.score-stat-val{font-family:'Lexend',sans-serif;font-size:1.5rem;font-weight:800;letter-spacing:-.02em}
.score-stat-label{font-size:.7rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.correct-stat .score-stat-val{color:var(--success)}
.wrong-stat .score-stat-val{color:var(--error)}
.skipped-stat .score-stat-val{color:var(--muted)}

/* Performance bar */
.perf-bar{height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;margin-bottom:8px;max-width:400px;margin-left:auto;margin-right:auto}
.perf-fill{height:100%;border-radius:4px;width:0;transition:width 1.5s cubic-bezier(.4,0,.2,1)}

/* Actions */
.result-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent3));color:white;border:none;padding:12px 24px;border-radius:12px;font-size:.875rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:8px}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-secondary{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:12px 24px;border-radius:12px;font-size:.875rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:8px}
.btn-secondary:hover{border-color:var(--accent2);color:var(--accent2)}
.btn-icon-only{width:44px;height:44px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.btn-icon-only:hover{border-color:var(--accent2)}
.btn-icon-only svg{width:18px;height:18px;stroke:var(--muted);fill:none;stroke-width:2}
.btn-icon-only:hover svg{stroke:var(--accent2)}

/* Leaderboard card */
.lb-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px;margin-bottom:32px;display:flex;align-items:center;gap:20px}
.lb-rank-badge{width:72px;height:72px;background:linear-gradient(135deg,var(--accent),var(--accent3));border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.lb-rank-num{font-family:'JetBrains Mono',monospace;font-size:1.5rem;font-weight:700;color:white}
.lb-rank-label{font-size:.6rem;color:rgba(255,255,255,.7);font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.lb-info{flex:1}
.lb-title{font-family:'Lexend',sans-serif;font-weight:700;font-size:.95rem;color:var(--text-bright);margin-bottom:4px}
.lb-meta{font-size:.8rem;color:var(--muted)}
.lb-percentile{text-align:right}
.lb-perc-val{font-family:'Lexend',sans-serif;font-size:1.8rem;font-weight:800;color:var(--accent2);letter-spacing:-.02em}
.lb-perc-label{font-size:.7rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em}

/* Question review */
.review-section{margin-top:32px}
.review-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:gap}
.review-title{font-family:'Lexend',sans-serif;font-weight:800;font-size:1.2rem;color:var(--text-bright)}
.filter-chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:8px;font-size:.75rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}
.chip.active{background:rgba(99,102,241,.15);border-color:rgba(99,102,241,.4);color:var(--accent2)}

.review-list{display:flex;flex-direction:column;gap:12px}
.review-card{background:var(--surface);border:2px solid var(--border);border-radius:16px;overflow:hidden;transition:border-color .2s}
.review-card.correct{border-color:rgba(34,197,94,.4)}
.review-card.wrong{border-color:rgba(239,68,68,.4)}
.review-card.skipped{border-color:var(--border)}
.review-card-header{display:flex;align-items:center;gap:12px;padding:16px 20px;cursor:pointer;user-select:none}
.review-status{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.status-correct{background:rgba(34,197,94,.15)}
.status-correct svg{stroke:var(--success)}
.status-wrong{background:rgba(239,68,68,.15)}
.status-wrong svg{stroke:var(--error)}
.status-skipped{background:var(--surface2)}
.status-skipped svg{stroke:var(--muted)}
.review-status svg{width:14px;height:14px;fill:none;stroke-width:2.5}
.review-q-text{font-size:.875rem;color:var(--text);font-weight:500;flex:1;line-height:1.5}
.review-toggle{width:18px;height:18px;stroke:var(--muted);fill:none;stroke-width:2;flex-shrink:0;transition:transform .2s}
.review-card.expanded .review-toggle{transform:rotate(180deg)}
.review-body{display:none;padding:0 20px 20px;border-top:1px solid var(--border)}
.review-card.expanded .review-body{display:block}
.review-opts{display:grid;gap:8px;margin-top:14px}
.review-opt{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);font-size:.85rem}
.review-opt.correct-ans{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.4);color:var(--success)}
.review-opt.wrong-ans{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.4);color:var(--error)}
.review-opt .ol{width:22px;height:22px;border-radius:6px;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.75rem;font-weight:700;flex-shrink:0}
.correct-ans .ol{background:rgba(34,197,94,.2);color:var(--success)}
.wrong-ans .ol{background:rgba(239,68,68,.2);color:var(--error)}
.your-ans-label{font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:14px;margin-bottom:6px}

/* Spinner */
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin:60px auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--surface);border:1px solid var(--success);color:var(--success);padding:12px 24px;border-radius:12px;font-size:.875rem;font-weight:600;transition:transform .3s;z-index:999}
.toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:600px){
  .score-card{padding:28px 20px}
  .lb-card{flex-wrap:wrap}
  .score-stats{grid-template-columns:1fr 1fr 1fr;gap:10px}
  .content{padding:20px 16px}
}
</style>
</head>
<body>
<div class="result-header">
  <a href="dashboard.html" class="back-btn"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>Dashboard</a>
  <div class="header-title" id="headerTitle">Results</div>
  <div style="width:80px"></div>
</div>

<div class="content">
  <div id="loadingState"><div class="spinner"></div></div>
  <div id="resultContent" style="display:none">
    <!-- Score Card -->
    <div class="score-card" id="scoreCard">
      <div class="score-circle">
        <svg viewBox="0 0 140 140">
          <circle class="score-circle-bg" cx="70" cy="70" r="60"/>
          <circle class="score-circle-fill" id="scoreRing" cx="70" cy="70" r="60"/>
        </svg>
        <div class="score-circle-text">
          <span class="score-perc" id="scorePerc">0%</span>
          <span class="score-label">Score</span>
        </div>
      </div>
      <div class="score-title" id="scoreTitle">Result</div>
      <div class="score-subtitle" id="scoreExam"></div>
      <div class="score-stats">
        <div class="score-stat correct-stat"><div class="score-stat-val" id="correctCount">0</div><div class="score-stat-label">Correct</div></div>
        <div class="score-stat wrong-stat"><div class="score-stat-val" id="wrongCount">0</div><div class="score-stat-label">Wrong</div></div>
        <div class="score-stat skipped-stat"><div class="score-stat-val" id="skippedCount">0</div><div class="score-stat-label">Skipped</div></div>
      </div>
      <div class="perf-bar"><div class="perf-fill" id="perfFill"></div></div>
      <div class="result-actions" id="resultActions" style="margin-top:24px"></div>
    </div>

    <!-- Leaderboard -->
    <div class="lb-card" id="lbCard" style="display:none">
      <div class="lb-rank-badge">
        <div class="lb-rank-num" id="lbRank">#—</div>
        <div class="lb-rank-label">Rank</div>
      </div>
      <div class="lb-info">
        <div class="lb-title">Your Leaderboard Position</div>
        <div class="lb-meta" id="lbMeta">Loading...</div>
      </div>
      <div class="lb-percentile">
        <div class="lb-perc-val" id="lbPerc">—%</div>
        <div class="lb-perc-label">Percentile</div>
      </div>
    </div>

    <!-- Review -->
    <div class="review-section">
      <div class="review-header">
        <div class="review-title">Question Review</div>
        <div class="filter-chips">
          <button class="chip active" data-f="all" onclick="setChip(this)">All</button>
          <button class="chip" data-f="correct" onclick="setChip(this)">Correct</button>
          <button class="chip" data-f="wrong" onclick="setChip(this)">Wrong</button>
          <button class="chip" data-f="skipped" onclick="setChip(this)">Skipped</button>
        </div>
      </div>
      <div class="review-list" id="reviewList"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast">Copied to clipboard!</div>

<script>
const API = '/api';
const token = localStorage.getItem('exalyte_token');
if (!token) window.location.href = 'index.html';

const params = new URLSearchParams(location.search);
const examId = params.get('examId');
const attemptId = params.get('attemptId');

let attempt, questions, exam, reviewFilter = 'all';

const colors = {
  outstanding: { color: '#22c55e', glow: 'rgba(34,197,94,.15)', label: 'Outstanding' },
  excellent: { color: '#22c55e', glow: 'rgba(34,197,94,.1)', label: 'Excellent' },
  good: { color: '#a855f7', glow: 'rgba(168,85,247,.1)', label: 'Good' },
  needs: { color: '#f59e0b', glow: 'rgba(245,158,11,.1)', label: 'Needs Work' },
  keep: { color: '#ef4444', glow: 'rgba(239,68,68,.1)', label: 'Keep Trying' },
};

function getGrade(p) {
  if (p >= 90) return colors.outstanding;
  if (p >= 80) return colors.excellent;
  if (p >= 60) return colors.good;
  if (p >= 40) return colors.needs;
  return colors.keep;
}

async function loadResult() {
  try {
    const res = await fetch(`${API}/exams/${examId}/result/${attemptId}`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    if (!res.ok) { window.location.href = 'dashboard.html'; return; }
    const data = await res.json();
    attempt = data.attempt;
    questions = data.questions;
    exam = data.exam;
    const answers = JSON.parse(attempt.answers || '{}');

    // Calculate stats
    let correct = 0, wrong = 0;
    questions.forEach(q => {
      const a = answers[q.id];
      if (a === q.correct_answer) correct++;
      else if (a) wrong++;
    });
    const skipped = questions.length - correct - wrong;

    const perc = attempt.percentage;
    const grade = getGrade(perc);

    // Update header
    document.getElementById('headerTitle').textContent = exam.name;
    document.title = `Result: ${exam.name} — Exalyte`;

    // Score circle
    const ring = document.getElementById('scoreRing');
    ring.style.stroke = grade.color;
    const circumference = 2 * Math.PI * 60;
    ring.style.strokeDasharray = circumference;
    setTimeout(() => {
      ring.style.strokeDashoffset = circumference - (perc / 100) * circumference;
    }, 100);

    // Score card glow
    document.getElementById('scoreCard').style.setProperty('--glow-color', grade.glow);

    // Animate percentage
    let count = 0;
    const target = perc;
    const interval = setInterval(() => {
      count = Math.min(count + 2, target);
      document.getElementById('scorePerc').textContent = count.toFixed(0) + '%';
      if (count >= target) clearInterval(interval);
    }, 16);

    document.getElementById('scoreTitle').textContent = grade.label;
    document.getElementById('scoreTitle').style.color = grade.color;
    document.getElementById('scoreExam').textContent = exam.name + (attempt.is_practice ? ' (Practice)' : '');
    document.getElementById('correctCount').textContent = correct;
    document.getElementById('wrongCount').textContent = wrong;
    document.getElementById('skippedCount').textContent = skipped;

    const fill = document.getElementById('perfFill');
    fill.style.background = `linear-gradient(90deg, ${grade.color}, ${grade.color}88)`;
    setTimeout(() => fill.style.width = perc + '%', 200);

    // Actions
    const actions = document.getElementById('resultActions');
    let actHtml = `<a href="dashboard.html" class="btn-secondary">Dashboard</a>`;
    if (!attempt.is_practice && exam.allow_practice) {
      actHtml += `<a href="exam.html?id=${examId}&practice=1" class="btn-primary">Practice Mode</a>`;
    }
    actHtml += `<button class="btn-icon-only" title="Share Result" onclick="shareResult(${perc.toFixed(0)})">
      <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
    </button>`;
    actions.innerHTML = actHtml;

    // Leaderboard
    if (!attempt.is_practice) {
      const lbRes = await fetch(`${API}/leaderboard/${examId}`, { headers: { Authorization: `Bearer ${token}` } });
      const lb = await lbRes.json();
      if (lb && lb.rank) {
        document.getElementById('lbCard').style.display = 'flex';
        document.getElementById('lbRank').textContent = '#' + lb.rank;
        document.getElementById('lbMeta').textContent = `Out of ${lb.total_participants} participants`;
        document.getElementById('lbPerc').textContent = `Top ${lb.percentile}%`;
      }
    }

    // Review
    renderReview(questions, answers);

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('resultContent').style.display = 'block';
  } catch(e) {
    document.getElementById('loadingState').innerHTML = '<p style="text-align:center;color:var(--error);padding:40px">Failed to load results.</p>';
  }
}

function renderReview(qs, answers) {
  const filtered = qs.filter(q => {
    const a = answers[q.id];
    if (reviewFilter === 'correct') return a === q.correct_answer;
    if (reviewFilter === 'wrong') return a && a !== q.correct_answer;
    if (reviewFilter === 'skipped') return !a;
    return true;
  });

  document.getElementById('reviewList').innerHTML = filtered.map((q, i) => {
    const a = answers[q.id];
    const status = a === q.correct_answer ? 'correct' : a ? 'wrong' : 'skipped';
    const icons = {
      correct: '<polyline points="20 6 9 17 4 12"/>',
      wrong: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
      skipped: '<circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/>'
    };
    return `
    <div class="review-card ${status}" id="rc${q.id}">
      <div class="review-card-header" onclick="toggleReview('${q.id}')">
        <div class="review-status status-${status}"><svg viewBox="0 0 24 24">${icons[status]}</svg></div>
        <div class="review-q-text">${esc(q.question_text)}</div>
        <svg class="review-toggle" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="review-body">
        ${q.image_url ? `<img src="${q.image_url}" style="max-width:100%;max-height:150px;border-radius:8px;margin-bottom:12px;border:1px solid var(--border)">` : ''}
        <div class="review-opts">
          ${['A','B','C','D'].map(l => {
            const isCorrect = l === q.correct_answer;
            const isYour = l === a;
            const cls = isCorrect ? 'correct-ans' : (isYour && !isCorrect ? 'wrong-ans' : '');
            return `<div class="review-opt ${cls}"><span class="ol">${l}</span>${esc(q['option_'+l.toLowerCase()])}</div>`;
          }).join('')}
        </div>
        ${a && a !== q.correct_answer ? `<div class="your-ans-label">Your answer: ${a} — Correct: ${q.correct_answer}</div>` : ''}
        ${!a ? `<div class="your-ans-label" style="color:var(--muted)">Not answered — Correct: ${q.correct_answer}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function toggleReview(id) {
  document.getElementById('rc'+id)?.classList.toggle('expanded');
}

function setChip(btn) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  reviewFilter = btn.dataset.f;
  const answers = JSON.parse(attempt?.answers || '{}');
  renderReview(questions, answers);
}

async function shareResult(perc) {
  const text = `I scored ${perc}% on "${exam?.name}" on Exalyte!\n\nhttps://exalyte.com`;
  try {
    if (navigator.share) { await navigator.share({ text }); return; }
  } catch {}
  try {
    await navigator.clipboard.writeText(text);
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
  } catch {}
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadResult();
</script>
</body>
</html>
