<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Result — Exalyte</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root,[data-theme="dark"]{--bg:#080810;--surface:#0e0e1c;--surface2:#13132a;--surface3:#1a1a36;--border:#1f1f3a;--border2:#2a2a4a;--accent:#5b5bd6;--accent-h:#6e6ee8;--muted:#8b8bae;--text:#c8c8e8;--bright:#f0f0ff;--success:#22c55e;--error:#ef4444;--warning:#f59e0b;--premium:#a855f7}
[data-theme="light"]{--bg:#f4f4f8;--surface:#ffffff;--surface2:#f0f0f6;--surface3:#e8e8f0;--border:#d8d8e8;--border2:#c8c8d8;--accent:#6366f1;--accent-h:#4f46e5;--text:#2d2d3d;--bright:#111128;--muted:#7c7c96;--error:#dc2626;--success:#16a34a;--warning:#d97706;--premium:#9333ea}

body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* Header - disappears on scroll */
header{position:fixed;top:0;left:0;right:0;z-index:200;height:60px;background:rgba(8,8,16,.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between;padding:0 24px;transition:transform .3s cubic-bezier(.4,0,.2,1)}
header.hidden{transform:translateY(-100%)}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--bright);font-family:'Sora',sans-serif;font-weight:700;font-size:1rem}
.logo-img{width:28px;height:28px;border-radius:6px;object-fit:cover}
.logo-text{background:linear-gradient(135deg,#ffffff,#a0a0ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-actions{display:flex;align-items:center;gap:10px}
.btn-header{background:transparent;border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:30px;font-size:.75rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s;text-decoration:none}
.btn-header:hover{border-color:var(--accent);color:var(--accent-h)}
.btn-exit{background:transparent;border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:30px;font-size:.75rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .2s}
.btn-exit:hover{border-color:var(--error);color:var(--error)}
.hamburger{display:none;background:none;border:none;color:var(--text);cursor:pointer;padding:6px}

/* Main Content */
.main-wrap{padding-top:60px;min-height:100vh;display:flex;flex-direction:column}

.content{max-width:860px;margin:0 auto;padding:32px 20px 60px;width:100%;flex:1}

/* Loading */
.loading-state{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:16px;color:var(--muted)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Score Card */
.score-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:36px 28px;text-align:center;margin-bottom:24px;position:relative;overflow:hidden}
.score-card::before{content:'';position:absolute;top:-40%;left:-40%;width:180%;height:180%;background:radial-gradient(circle at 50% 35%,var(--glow,rgba(99,102,241,.08)),transparent 60%);pointer-events:none}
.score-circle-wrap{width:128px;height:128px;margin:0 auto 16px;position:relative}
.score-circle-wrap svg{transform:rotate(-90deg);width:128px;height:128px}
.sc-bg{fill:none;stroke:var(--surface2);stroke-width:8}
.sc-fill{fill:none;stroke-width:8;stroke-linecap:round;stroke-dasharray:352;stroke-dashoffset:352;transition:stroke-dashoffset 1.6s cubic-bezier(.4,0,.2,1)}
.sc-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.sc-perc{font-family:'Sora',sans-serif;font-size:1.8rem;font-weight:900;color:var(--bright);line-height:1}
.sc-label{font-size:.6rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-top:3px}
.score-grade{font-family:'Sora',sans-serif;font-size:1.2rem;font-weight:900;margin-bottom:4px}
.score-exam{font-size:.82rem;color:var(--muted);margin-bottom:20px}
.score-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:360px;margin:0 auto 18px}
.sc-stat{background:var(--surface2);border-radius:12px;padding:12px 8px}
.sc-stat-val{font-family:'Sora',sans-serif;font-size:1.3rem;font-weight:900}
.sc-stat-lbl{font-size:.6rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-top:2px}
.sc-stat.correct .sc-stat-val{color:var(--success)}
.sc-stat.wrong .sc-stat-val{color:var(--error)}
.sc-stat.skip .sc-stat-val{color:var(--muted)}
.perf-bar{height:6px;background:var(--surface2);border-radius:4px;max-width:360px;margin:0 auto 20px;overflow:hidden}
.perf-fill{height:100%;border-radius:4px;width:0;transition:width 1.6s cubic-bezier(.4,0,.2,1)}
.result-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.result-actions .btn{padding:10px 24px;border-radius:40px;font-size:.82rem;font-weight:600;cursor:pointer;border:none;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-h));color:#fff}
.btn-primary:hover{opacity:.9;transform:translateY(-1px)}
.btn-secondary{background:var(--surface2);border:1px solid var(--border);color:var(--text)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent-h)}

/* Leaderboard Card */
.lb-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.lb-badge{width:60px;height:60px;background:linear-gradient(135deg,var(--accent),var(--accent-h));border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.lb-rank-num{font-family:'Sora',sans-serif;font-size:1.2rem;font-weight:800;color:#fff}
.lb-rank-lbl{font-size:.5rem;color:rgba(255,255,255,.7);font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.lb-info{flex:1;min-width:140px}
.lb-info-title{font-family:'Sora',sans-serif;font-weight:700;font-size:.88rem;color:var(--bright);margin-bottom:2px}
.lb-info-sub{font-size:.76rem;color:var(--muted)}
.lb-perc{text-align:right}
.lb-perc-val{font-family:'Sora',sans-serif;font-size:1.5rem;font-weight:900;color:var(--accent-h)}
.lb-perc-lbl{font-size:.6rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.07em}

/* Pending State */
.pending-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:60px 28px;text-align:center;margin-bottom:24px}
.pending-card .icon{font-size:3rem;margin-bottom:12px;display:block}
.pending-card .title{font-family:'Sora',sans-serif;font-size:1.2rem;font-weight:800;color:var(--warning);margin-bottom:6px}
.pending-card .sub{font-size:.85rem;color:var(--muted);max-width:400px;margin:0 auto 20px;line-height:1.6}

/* Review Section */
.review-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.review-head .title{font-family:'Sora',sans-serif;font-weight:700;font-size:1rem;color:var(--bright)}
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:5px 14px;border-radius:30px;font-size:.72rem;font-weight:600;cursor:pointer;transition:all .2s;border:none;font-family:'DM Sans',sans-serif}
.chip.active{background:rgba(99,102,241,.14);color:var(--accent-h);border:1px solid rgba(99,102,241,.3)}
.chip:hover{background:rgba(99,102,241,.08)}

.review-list{display:flex;flex-direction:column;gap:10px}
.rv-card{background:var(--surface);border:2px solid var(--border);border-radius:16px;overflow:hidden;transition:border-color .2s}
.rv-card.rv-correct{border-color:rgba(34,197,94,.4)}
.rv-card.rv-wrong{border-color:rgba(239,68,68,.3)}
.rv-card.rv-skip{border-color:var(--border)}
.rv-header{display:flex;align-items:center;gap:10px;padding:14px 16px;cursor:pointer;user-select:none}
.rv-status{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rv-status svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2.5}
.rv-correct .rv-status{background:rgba(34,197,94,.14);color:var(--success)}
.rv-wrong .rv-status{background:rgba(239,68,68,.12);color:var(--error)}
.rv-skip .rv-status{background:var(--surface2);color:var(--muted)}
.rv-q{font-size:.84rem;color:var(--text);flex:1;line-height:1.5;white-space:pre-wrap}
.rv-arrow{width:16px;height:16px;stroke:var(--muted);fill:none;stroke-width:2;flex-shrink:0;transition:transform .2s}
.rv-card.open .rv-arrow{transform:rotate(180deg)}
.rv-body{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
.rv-card.open .rv-body{display:block}
.rv-opts{display:flex;flex-direction:column;gap:6px;margin-top:12px}
.rv-opt{display:flex;align-items:flex-start;gap:8px;padding:8px 12px;border-radius:9px;background:var(--surface2);border:1.5px solid var(--border);font-size:.8rem;color:var(--text);white-space:pre-wrap}
.rv-opt.rv-opt-correct{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.4);color:var(--success)}
.rv-opt.rv-opt-wrong{background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.3);color:var(--error)}
.rv-ol{width:22px;height:22px;border-radius:6px;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:700;flex-shrink:0;color:var(--muted)}
.rv-opt-correct .rv-ol{background:rgba(34,197,94,.2);color:var(--success)}
.rv-opt-wrong .rv-ol{background:rgba(239,68,68,.15);color:var(--error)}
.rv-ans-note{font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:10px}
.rv-explanation{margin-top:10px;padding:10px 14px;background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.2);border-radius:10px;font-size:.78rem;color:var(--accent-h);line-height:1.6;white-space:pre-wrap}
.rv-explanation strong{color:var(--bright);display:block;margin-bottom:3px;font-size:.68rem;text-transform:uppercase;letter-spacing:.06em}
.empty-review{text-align:center;padding:40px;color:var(--muted);font-size:.82rem}

/* Footer */
.footer{background:var(--surface);border-top:1px solid var(--border);padding:32px 40px 24px;margin-top:auto}
.footer-inner{max-width:1160px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px}
.footer-links{display:flex;gap:24px}
.footer-links a{color:var(--muted);text-decoration:none;font-size:.72rem;transition:color .2s}
.footer-links a:hover{color:var(--accent-h)}
.footer-copy{font-size:.68rem;color:var(--muted)}

/* Mobile Bottom Nav */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:30;padding:6px 0 8px}
.bottom-nav-items{display:flex}
.bottom-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 2px;color:var(--muted);font-size:.55rem;font-weight:600;border:none;background:none;cursor:pointer;transition:color .2s}
.bottom-nav-item.active{color:var(--accent-h)}
.bottom-nav-item svg{width:18px;height:18px;stroke:currentColor;fill:none}

/* Share Toast */
.share-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);border:1px solid var(--success);color:var(--success);padding:10px 20px;border-radius:10px;font-size:.82rem;font-weight:600;transition:transform .3s;z-index:100;white-space:nowrap}
.share-toast.show{transform:translateX(-50%) translateY(0)}

/* Responsive */
@media(max-width:900px){
  header{padding:0 16px}
  .content{padding:24px 16px 80px}
  .score-card{padding:28px 20px}
  .score-circle-wrap{width:100px;height:100px}
  .score-circle-wrap svg{width:100px;height:100px}
  .sc-perc{font-size:1.4rem}
  .lb-card{padding:16px}
  .lb-badge{width:48px;height:48px}
  .lb-rank-num{font-size:1rem}
  .review-head{flex-direction:column;align-items:flex-start}
  .bottom-nav{display:block}
  .footer{padding:24px 20px}
  .footer-inner{flex-direction:column;text-align:center}
  .btn-header span{display:none}
}

@media(max-width:540px){
  .score-stats{grid-template-columns:1fr 1fr;max-width:100%}
  .score-stats .sc-stat:last-child{grid-column:span 2}
  .result-actions .btn{flex:1;justify-content:center}
  .rv-header{padding:12px 14px}
  .rv-q{font-size:.78rem}
  .rv-body{padding:0 14px 14px}
  .rv-opt{font-size:.75rem;padding:6px 10px}
  .lb-perc{text-align:left}
  .pending-card{padding:40px 20px}
}
</style>
</head>
<body>

<header id="mainHeader">
  <a href="/" class="logo">
    <img src="images/exalyte.png" alt="Exalyte" class="logo-img" onerror="this.style.display='none'">
    <span class="logo-text">Exalyte</span>
  </a>
  <div class="header-actions">
    <a href="dashboard.html" class="btn-header">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>Dashboard</span>
    </a>
    <button class="btn-exit" onclick="logout()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 16l4-4m0 0l-4-4m4 4H7"/></svg>
      <span>Exit</span>
    </button>
  </div>
</header>

<main class="main-wrap">
  <div class="content">
    <!-- Loading State -->
    <div id="loadingState" class="loading-state">
      <div class="spinner"></div>
      <span>Loading your result...</span>
    </div>

    <!-- Result Content -->
    <div id="resultWrap" style="display:none"></div>
  </div>
</main>

<!-- Footer -->
<footer class="footer">
  <div class="footer-inner">
    <div class="footer-copy">© 2025 Exalyte. All rights reserved.</div>
    <div class="footer-links">
      <a href="privacy.html">Privacy</a>
      <a href="tos.html">Terms</a>
      <a href="contact.html">Contact</a>
    </div>
  </div>
</footer>

<!-- Bottom Nav (mobile) -->
<div class="bottom-nav">
  <div class="bottom-nav-items">
    <button class="bottom-nav-item" onclick="window.location='dashboard.html'">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Home
    </button>
    <button class="bottom-nav-item active">
      <svg viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10"/></svg>Result
    </button>
    <button class="bottom-nav-item" onclick="window.location='exam-history.html'">
      <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/></svg>History
    </button>
    <button class="bottom-nav-item" onclick="logout()">
      <svg viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7"/></svg>Exit
    </button>
  </div>
</div>

<!-- Share Toast -->
<div class="share-toast" id="shareToast">Copied to clipboard!</div>

<script>
const API = '/api';

function getToken(){return localStorage.getItem('exalyte_token')}
function getUser(){return JSON.parse(localStorage.getItem('exalyte_user')||'null')}
function logout(){localStorage.clear();window.location.href='/'}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function formatDate(iso){return iso?new Date(iso).toLocaleDateString()+' '+new Date(iso).toLocaleTimeString():'—'}

async function apiFetch(path,opts={}){
  const token=getToken();
  const headers={'Content-Type':'application/json',...(token?{Authorization:`Bearer ${token}`}:{})};
  const res=await fetch(API+path,{...opts,headers});
  return{ok:res.ok,data:await res.json().catch(()=>({}))};
}

const params=new URLSearchParams(location.search);
const examId=params.get('examId');
const attemptId=params.get('attemptId');

if(!examId||!attemptId)window.location.href='dashboard.html';
if(!getToken())window.location.href='/';

let attempt,questions,exam,userAnswers={},reviewFilter='all';

// Header scroll hide
let lastScroll=0;
const header=document.getElementById('mainHeader');
window.addEventListener('scroll',()=>{
  const currentScroll=window.pageYOffset;
  if(currentScroll>lastScroll&&currentScroll>80)header.classList.add('hidden');
  else header.classList.remove('hidden');
  lastScroll=currentScroll;
});

function gradeInfo(perc){
  if(perc>=90)return{label:'Outstanding',color:'#22c55e',glow:'rgba(34,197,94,.15)'}
  if(perc>=80)return{label:'Excellent',color:'#22c55e',glow:'rgba(34,197,94,.1)'}
  if(perc>=60)return{label:'Good',color:'#a855f7',glow:'rgba(168,85,247,.1)'}
  if(perc>=40)return{label:'Needs Work',color:'#f59e0b',glow:'rgba(245,158,11,.1)'}
  return{label:'Keep Trying',color:'#ef4444',glow:'rgba(239,68,68,.1)'}
}

async function loadResult(){
  try{
    const{ok,data}=await apiFetch(`/exams/${examId}/result/${attemptId}`);
    if(!ok){window.location.href='dashboard.html';return}
    
    document.getElementById('loadingState').style.display='none';
    document.getElementById('resultWrap').style.display='block';
    
    // Pending results
    if(data.pending){
      document.getElementById('resultWrap').innerHTML=`
        <div class="pending-card">
          <span class="icon">⏳</span>
          <div class="title">Results Pending</div>
          <div class="sub">${esc(data.message||'Results will be available after the exam window closes and results are published.')}</div>
          <a href="dashboard.html" class="btn btn-primary">Back to Dashboard</a>
        </div>
      `;
      return;
    }
    
    attempt=data.attempt;
    questions=data.questions||[];
    exam=data.exam;
    userAnswers=JSON.parse(attempt.answers||'{}');
    
    let correct=0,wrong=0,skipped=0;
    questions.forEach(q=>{
      const a=userAnswers[q.id];
      if(a===q.correct_answer)correct++;
      else if(a)wrong++;
      else skipped++;
    });
    const perc=attempt.percentage||0;
    const grade=gradeInfo(perc);
    
    // Build result
    let html=`
    <div class="score-card" id="scoreCard">
      <div class="score-circle-wrap">
        <svg viewBox="0 0 128 128">
          <circle class="sc-bg" cx="64" cy="64" r="56"/>
          <circle class="sc-fill" id="scRing" cx="64" cy="64" r="56"/>
        </svg>
        <div class="sc-inner">
          <div class="sc-perc" id="scPerc">0%</div>
          <div class="sc-label">Score</div>
        </div>
      </div>
      <div class="score-grade" id="scGrade"></div>
      <div class="score-exam" id="scExam"></div>
      <div class="score-stats">
        <div class="sc-stat correct"><div class="sc-stat-val" id="scCorrect">${correct}</div><div class="sc-stat-lbl">Correct</div></div>
        <div class="sc-stat wrong"><div class="sc-stat-val" id="scWrong">${wrong}</div><div class="sc-stat-lbl">Wrong</div></div>
        <div class="sc-stat skip"><div class="sc-stat-val" id="scSkip">${skipped}</div><div class="sc-stat-lbl">Skipped</div></div>
      </div>
      <div class="perf-bar"><div class="perf-fill" id="scBar"></div></div>
      <div class="result-actions" id="resultActions"></div>
    </div>`;
    
    // Leaderboard
    if(!attempt.is_practice){
      const{ok:lok,data:lb}=await apiFetch(`/leaderboard/${examId}`);
      if(lok&&lb?.rank&&!lb.disabled){
        html+=`
        <div class="lb-card">
          <div class="lb-badge"><div class="lb-rank-num">#${lb.rank}</div><div class="lb-rank-lbl">Rank</div></div>
          <div class="lb-info"><div class="lb-info-title">Your Leaderboard Position</div><div class="lb-info-sub">Out of ${lb.total_participants} participant${lb.total_participants!==1?'s':''}</div></div>
          <div class="lb-perc"><div class="lb-perc-val">Top ${lb.percentile}%</div><div class="lb-perc-lbl">Percentile</div></div>
        </div>`;
      }
    }
    
    // Review
    html+=`
    <div class="review-head">
      <span class="title">Question Review</span>
      <div class="chips">
        <button class="chip active" data-f="all" onclick="setFilter(this,'all')">All</button>
        <button class="chip" data-f="correct" onclick="setFilter(this,'correct')">Correct</button>
        <button class="chip" data-f="wrong" onclick="setFilter(this,'wrong')">Wrong</button>
        <button class="chip" data-f="skipped" onclick="setFilter(this,'skipped')">Skipped</button>
      </div>
    </div>
    <div class="review-list" id="reviewList"></div>`;
    
    document.getElementById('resultWrap').innerHTML=html;
    
    // Animate score ring
    const ring=document.getElementById('scRing');
    const circ=2*Math.PI*56;
    ring.style.strokeDasharray=circ;
    ring.style.stroke=grade.color;
    document.getElementById('scoreCard').style.setProperty('--glow',grade.glow);
    setTimeout(()=>{ring.style.strokeDashoffset=circ-(perc/100)*circ},100);
    
    // Animate percentage counter
    let count=0;
    const target=Math.round(perc*10)/10;
    const step=target/60;
    const ticker=setInterval(()=>{
      count=Math.min(count+step,target);
      document.getElementById('scPerc').textContent=count.toFixed(1)+'%';
      if(count>=target){clearInterval(ticker);document.getElementById('scPerc').textContent=target.toFixed(1)+'%'}
    },20);
    
    document.getElementById('scGrade').textContent=grade.label;
    document.getElementById('scGrade').style.color=grade.color;
    document.getElementById('scExam').textContent=exam.name+(attempt.is_practice?' — Practice':'');
    
    const bar=document.getElementById('scBar');
    bar.style.background=`linear-gradient(90deg,${grade.color},${grade.color}88)`;
    setTimeout(()=>{bar.style.width=Math.max(perc,2)+'%'},120);
    
    // Actions
    let actionsHtml=`
      <a href="dashboard.html" class="btn btn-secondary"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
      <button class="btn btn-secondary" onclick="shareResult(${perc.toFixed(1)})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>Share</button>
    `;
    if(!attempt.is_practice&&exam.allow_practice){
      actionsHtml+=`<a href="exam.html?id=${examId}&practice=1" class="btn btn-primary"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>Practice Mode</a>`;
    }
    document.getElementById('resultActions').innerHTML=actionsHtml;
    
    renderReview();
  }catch(e){
    document.getElementById('loadingState').innerHTML='<p style="color:var(--error)">Failed to load result. <a href="dashboard.html" style="color:var(--accent-h)">Go back</a></p>';
  }
}

function renderReview(){
  const filtered=questions.filter(q=>{
    const a=userAnswers[q.id];
    if(reviewFilter==='correct')return a===q.correct_answer;
    if(reviewFilter==='wrong')return a&&a!==q.correct_answer;
    if(reviewFilter==='skipped')return !a;
    return true;
  });
  
  if(!filtered.length){
    document.getElementById('reviewList').innerHTML='<div class="empty-review">No questions in this filter.</div>';
    return;
  }
  
  const icons={correct:'<polyline points="20 6 9 17 4 12"/>',wrong:'<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',skipped:'<circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/>'};
  
  document.getElementById('reviewList').innerHTML=filtered.map(q=>{
    const a=userAnswers[q.id];
    const st=a===q.correct_answer?'correct':a?'wrong':'skip';
    const cls={correct:'rv-correct',wrong:'rv-wrong',skip:'rv-skip'}[st];
    const opts=['A','B','C','D'].map(l=>{
      const isCorrect=l===q.correct_answer;
      const isYours=l===a&&!isCorrect;
      const optCls=isCorrect?'rv-opt-correct':isYours?'rv-opt-wrong':'';
      return `<div class="rv-opt ${optCls}"><div class="rv-ol">${l}</div><div style="flex:1;line-height:1.4">${esc(q['option_'+l.toLowerCase()])}</div></div>`;
    }).join('');
    
    let note='';
    if(a&&a!==q.correct_answer)note=`<div class="rv-ans-note">Your answer: ${a} — Correct: ${q.correct_answer}</div>`;
    else if(!a)note=`<div class="rv-ans-note" style="color:var(--muted)">Not answered — Correct: ${q.correct_answer}</div>`;
    
    let explanationHtml='';
    if(q.explanation&&q.explanation.trim()){
      explanationHtml=`<div class="rv-explanation"><strong>Explanation</strong>${esc(q.explanation)}</div>`;
    }
    
    return `<div class="rv-card ${cls}" id="rv${q.id}">
      <div class="rv-header" onclick="toggleReview('${q.id}')">
        <div class="rv-status"><svg viewBox="0 0 24 24">${icons[st]}</svg></div>
        <div class="rv-q">${esc(q.question_text)}</div>
        <svg class="rv-arrow" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="rv-body">
        ${q.image_url?`<img src="${esc(q.image_url)}" style="max-width:100%;max-height:140px;border-radius:9px;margin-bottom:10px;border:1px solid var(--border);object-fit:contain">`:''}
        <div class="rv-opts">${opts}</div>
        ${note}
        ${explanationHtml}
      </div>
    </div>`;
  }).join('');
}

function toggleReview(id){document.getElementById('rv'+id)?.classList.toggle('open')}
function setFilter(btn,filter){
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  reviewFilter=filter;
  renderReview();
}

function shareResult(perc){
  const text=`I scored ${perc}% on "${exam?.name}" on Exalyte!\n\nhttps://exalyte.pages.dev`;
  if(navigator.share){navigator.share({title:'My Exalyte Result',text}).catch(()=>{})}
  else{
    navigator.clipboard.writeText(text).then(()=>{
      const t=document.getElementById('shareToast');
      t.classList.add('show');
      setTimeout(()=>t.classList.remove('show'),2500);
    }).catch(()=>{})
  }
}

loadResult();
</script>

</html>
